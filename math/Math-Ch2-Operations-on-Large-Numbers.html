<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-Gurukul · Learn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --saffron: #E87722; --marigold: #F4A82C; --cream: #FFF8EE; --paper: #FDF6E8;
  --paper-dark: #F5EBD3; --ink: #2B1810; --ink-soft: #5C4332; --leaf: #4A7C59;
  --leaf-light: #E8F4EA; --berry: #B8385E; --berry-light: #FBE9EE; --gold: #D4A53A;
  --sky: #5B8DB8; --sky-light: #E5F0F8; --shadow: rgba(43,24,16,0.12); --shadow-strong: rgba(43,24,16,0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--paper); color: var(--ink); font-family: 'Nunito', sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle at 20% 30%, rgba(232,119,34,0.04) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(244,168,44,0.06) 0%, transparent 50%); pointer-events: none; z-index: 0; }
.container { max-width: 920px; margin: 0 auto; padding: 24px 20px 80px; position: relative; z-index: 1; }
header.app-header { margin-bottom: 28px; padding: 24px 28px; background: linear-gradient(135deg, var(--saffron) 0%, var(--marigold) 100%); border-radius: 24px; color: white; box-shadow: 0 8px 24px var(--shadow); position: relative; overflow: hidden; }
header.app-header::before { content: ''; position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%); border-radius: 50%; }
.header-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.9; margin-bottom: 6px; }
.header-title { font-family: 'Fraunces', serif; font-weight: 900; font-size: clamp(26px, 5vw, 38px); line-height: 1.15; letter-spacing: -0.5px; }
.header-meta { margin-top: 10px; font-size: 14px; opacity: 0.95; font-weight: 600; }
.header-author { margin-top: 6px; font-size: 14px; opacity: 0.85; font-weight: 500; font-style: italic; }
.header-theme-pill { display: inline-block; margin-top: 12px; background: rgba(0,0,0,0.25); color: white; padding: 5px 14px; border-radius: 14px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; backdrop-filter: blur(4px); }
.reset-btn { position: absolute; top: 16px; right: 16px; background: var(--ink); color: white; border: 2px solid rgba(255,255,255,0.3); padding: 7px 14px; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.2s ease; z-index: 2; }
.reset-btn:hover { background: #1a0e07; border-color: white; transform: translateY(-1px); }
.progress-bar { display: flex; gap: 8px; margin-bottom: 32px; }
.progress-step { flex: 1; padding: 12px 8px; background: var(--paper-dark); border-radius: 12px; text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink-soft); cursor: pointer; transition: all 0.25s ease; border: 2px solid transparent; user-select: none; position: relative; }
.progress-step:hover { background: var(--cream); border-color: var(--marigold); }
.progress-step.active { background: var(--ink); color: var(--cream); }
.progress-step.complete { background: var(--leaf); color: white; }
.progress-step.locked { opacity: 0.5; cursor: not-allowed; }
.progress-step.locked:hover { background: var(--paper-dark); border-color: transparent; }
.progress-step.complete::after { content: '✓'; position: absolute; top: 4px; right: 6px; font-size: 11px; font-weight: 900; }
.progress-step.locked::after { content: '🔒'; position: absolute; top: 4px; right: 6px; font-size: 10px; }
.step-num { display: block; font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; }
.stage-header { margin-bottom: 24px; }
.stage-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: clamp(24px, 4vw, 32px); color: var(--ink); letter-spacing: -0.3px; margin-bottom: 6px; }
.stage-description { color: var(--ink-soft); font-size: 15px; }
.branches-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
.branch-card { background: var(--cream); border: 2px solid var(--paper-dark); border-radius: 18px; padding: 24px 20px; cursor: pointer; transition: all 0.25s ease; text-align: center; position: relative; }
.branch-card:hover { border-color: var(--marigold); transform: translateY(-3px); box-shadow: 0 6px 16px var(--shadow); }
.branch-card.complete { border-color: var(--leaf); background: var(--leaf-light); }
.branch-card.complete::after { content: '✓'; position: absolute; top: 12px; right: 16px; width: 24px; height: 24px; background: var(--leaf); color: white; border-radius: 50%; line-height: 24px; font-weight: 900; font-size: 14px; }
.branch-icon { font-size: 40px; margin-bottom: 12px; }
.branch-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; color: var(--ink); margin-bottom: 4px; }
.branch-meta { font-size: 12px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.branch-progress { margin-top: 12px; font-size: 13px; color: var(--ink-soft); }
.panel-container { background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 16px var(--shadow); margin-bottom: 20px; }
.panel-dots { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.panel-dot { background: var(--paper-dark); color: var(--ink-soft); border: 2px solid transparent; padding: 8px 14px; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s ease; min-width: 44px; }
.panel-dot:hover { border-color: var(--marigold); }
.panel-dot.current { background: var(--ink); color: var(--cream); }
.panel-dot.answered { background: var(--leaf); color: white; }
.panel-dot.current.answered { background: var(--ink); border-color: var(--leaf); border-width: 3px; }
.panel-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--paper-dark); }
.panel-counter { font-size: 12px; font-weight: 800; color: var(--saffron); letter-spacing: 1.5px; text-transform: uppercase; }
.panel-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; color: var(--ink); margin-bottom: 16px; }
.narration-text { font-size: 16px; line-height: 1.75; color: var(--ink); margin-bottom: 16px; }
.narration-text .highlight-word { background: linear-gradient(180deg, transparent 60%, rgba(244,168,44,0.4) 60%); cursor: pointer; font-weight: 700; color: var(--ink); border-radius: 2px; transition: background 0.2s ease; position: relative; }
.narration-text .highlight-word:hover { background: linear-gradient(180deg, transparent 30%, rgba(244,168,44,0.7) 30%); }
.word-tooltip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--cream); padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; line-height: 1.4; width: max-content; max-width: 240px; text-align: center; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,0.25); pointer-events: none; }
.word-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--ink); }
.tts-controls { display: flex; gap: 10px; align-items: center; background: var(--sky-light); border-radius: 12px; padding: 10px 14px; margin-bottom: 16px; flex-wrap: wrap; }
.tts-btn { background: var(--sky); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px; }
.tts-btn:hover { background: #4a7a9c; }
.tts-btn.playing { background: var(--berry); animation: pulse 1.5s ease-in-out infinite; }
.tts-status { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.comprehension-check { background: var(--cream); border: 2px solid var(--marigold); border-radius: 16px; padding: 20px; margin-top: 16px; }
.check-label { display: inline-block; background: var(--saffron); color: white; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.check-question { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; line-height: 1.4; margin-bottom: 14px; color: var(--ink); }
.options-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.option-btn { background: white; border: 2px solid var(--paper-dark); padding: 12px 16px; border-radius: 12px; text-align: left; cursor: pointer; font-family: inherit; font-size: 14px; color: var(--ink); transition: all 0.2s ease; width: 100%; display: flex; align-items: center; gap: 10px; }
.option-btn:hover:not(:disabled) { border-color: var(--marigold); background: var(--paper); transform: translateX(2px); }
.option-letter { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; background: var(--paper-dark); border-radius: 8px; font-weight: 700; font-size: 12px; flex-shrink: 0; color: var(--ink-soft); }
.option-btn.correct { background: var(--leaf-light); border-color: var(--leaf); color: var(--leaf); font-weight: 700; }
.option-btn.correct .option-letter { background: var(--leaf); color: white; }
.option-btn.incorrect { background: var(--berry-light); border-color: var(--berry); color: var(--berry); }
.option-btn.incorrect .option-letter { background: var(--berry); color: white; }
.option-btn:disabled { cursor: default; }
.feedback-box { margin-top: 12px; padding: 14px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; animation: slideDown 0.3s ease; }
.feedback-box.hint { background: #FFF4D6; border-left: 4px solid var(--gold); color: var(--ink); }
.feedback-box.explanation { background: var(--leaf-light); border-left: 4px solid var(--leaf); color: var(--ink); }
.feedback-label { font-weight: 800; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; margin-bottom: 4px; display: block; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.panel-nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
.vocab-group-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.vocab-group-tab { background: var(--paper-dark); color: var(--ink-soft); border: 2px solid transparent; padding: 10px 18px; border-radius: 12px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s ease; }
.vocab-group-tab:hover { border-color: var(--marigold); }
.vocab-group-tab.active { background: var(--saffron); color: white; }
.vocab-card { height: 280px; cursor: pointer; perspective: 1000px; }
.vocab-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(0.4, 0.0, 0.2, 1); transform-style: preserve-3d; }
.vocab-card.flipped .vocab-card-inner { transform: rotateY(180deg); }
.vocab-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 18px; padding: 22px; display: flex; flex-direction: column; box-shadow: 0 4px 16px var(--shadow); overflow: hidden; }
.vocab-face.front { background: var(--cream); border: 2px solid var(--paper-dark); align-items: center; justify-content: center; text-align: center; }
.vocab-face.back { background: linear-gradient(135deg, var(--saffron), var(--marigold)); color: white; transform: rotateY(180deg); overflow-y: auto; text-align: left; }
.vocab-card.complete .vocab-face.front { border-color: var(--leaf); background: var(--leaf-light); }
.vocab-card.complete .vocab-face.front::after { content: '✓'; position: absolute; top: 12px; right: 16px; width: 24px; height: 24px; background: var(--leaf); color: white; border-radius: 50%; line-height: 24px; font-weight: 900; font-size: 14px; }
.vocab-word { font-family: 'Fraunces', serif; font-weight: 700; font-size: 30px; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.5px; }
.vocab-source-tag { display: inline-block; background: var(--paper-dark); color: var(--ink-soft); padding: 2px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.vocab-flip-hint { margin-top: 12px; font-size: 11px; color: var(--ink-soft); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; opacity: 0.6; }
.vocab-meaning { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 500; line-height: 1.4; margin-bottom: 10px; }
.vocab-example { font-size: 12px; line-height: 1.45; margin-bottom: 6px; opacity: 0.95; }
.vocab-example-label { font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.85; margin-bottom: 2px; display: block; }
.spot-it-cta { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 10px; text-align: center; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid rgba(255,255,255,0.4); }
.spot-it-cta:hover { background: rgba(255,255,255,0.3); }
.modal-overlay { position: fixed; inset: 0; background: rgba(43,24,16,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content { background: var(--cream); border-radius: 20px; padding: 28px; max-width: 480px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.modal-word { color: var(--saffron); font-style: italic; }
.question-card { background: var(--cream); border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--paper-dark); }
.question-number { display: inline-block; background: var(--ink); color: var(--cream); font-family: 'Fraunces', serif; font-weight: 700; width: 36px; height: 36px; line-height: 36px; text-align: center; border-radius: 50%; font-size: 16px; margin-bottom: 12px; }
.passage-excerpt { background: var(--paper); padding: 12px 16px; border-radius: 12px; border-left: 4px solid var(--sky); margin-bottom: 12px; font-style: italic; color: var(--ink-soft); font-size: 13px; line-height: 1.5; }
.question-text { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; line-height: 1.4; margin-bottom: 14px; color: var(--ink); }
.question-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.btn { padding: 10px 18px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 14px; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--paper-dark); color: var(--ink); }
.btn-secondary:hover:not(:disabled) { background: var(--marigold); color: white; }
.btn-primary { background: var(--saffron); color: white; box-shadow: 0 4px 12px rgba(232,119,34,0.3); }
.btn-primary:hover:not(:disabled) { background: var(--ink); transform: translateY(-2px); }
.btn-success { background: var(--leaf); color: white; box-shadow: 0 4px 12px rgba(74,124,89,0.3); }
.btn-success:hover:not(:disabled) { background: #3a6248; transform: translateY(-2px); }
.stage-nav { margin-top: 32px; display: flex; justify-content: space-between; gap: 12px; }
.placeholder-card { background: var(--cream); border: 2px dashed var(--paper-dark); border-radius: 20px; padding: 48px 32px; text-align: center; color: var(--ink-soft); }
.placeholder-icon { font-size: 60px; margin-bottom: 16px; opacity: 0.5; }
.placeholder-title { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); margin-bottom: 8px; }
.placeholder-detail { font-size: 14px; line-height: 1.6; max-width: 480px; margin: 0 auto; }
.loading-screen, .error-screen { text-align: center; padding: 48px 20px; }
.spinner { width: 48px; height: 48px; border: 4px solid var(--paper-dark); border-top-color: var(--saffron); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-screen { background: var(--berry-light); border: 2px solid var(--berry); color: var(--berry); border-radius: 16px; }
/* === STAGE 0: DEEP DIVE REFERENCE === */
.deep-dive-trigger { display: flex; align-items: center; gap: 14px; background: linear-gradient(135deg, var(--sky) 0%, #3d6d8f 100%); color: white; border: none; padding: 20px 28px; border-radius: 18px; font-family: inherit; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.25s ease; margin-bottom: 28px; width: 100%; box-shadow: 0 4px 16px rgba(91,141,184,0.3); }
.deep-dive-trigger:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(91,141,184,0.4); }
.deep-dive-trigger .dd-icon { font-size: 36px; }
.deep-dive-trigger .dd-text { text-align: left; }
.deep-dive-trigger .dd-title { font-family: 'Fraunces', serif; font-size: 22px; display: block; }
.deep-dive-trigger .dd-sub { font-size: 14px; opacity: 0.9; font-weight: 500; display: block; margin-top: 2px; }

.dd-screen { padding: 0; }
.dd-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.dd-nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.dd-nav-btn { background: var(--paper-dark); color: var(--ink-soft); border: 2px solid transparent; padding: 10px 16px; border-radius: 12px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s ease; }
.dd-nav-btn:hover { border-color: var(--sky); }
.dd-nav-btn.active { background: var(--sky); color: white; }

.dd-topic { background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 16px var(--shadow); margin-bottom: 24px; }
.dd-topic-title { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.dd-topic-subtitle { font-size: 14px; color: var(--ink-soft); margin-bottom: 20px; }

.dd-section { margin-bottom: 28px; }
.dd-section-label { display: inline-block; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 12px; border-radius: 8px; margin-bottom: 12px; }
.dd-section-label.story { background: var(--berry-light); color: var(--berry); }
.dd-section-label.steps { background: var(--leaf-light); color: var(--leaf); }
.dd-section-label.visual { background: var(--sky-light); color: var(--sky); }
.dd-section-label.video { background: #FFF4D6; color: var(--gold); }
.dd-section-label.tip { background: var(--cream); color: var(--saffron); }

.dd-story { background: var(--cream); border-radius: 16px; padding: 24px; border-left: 5px solid var(--berry); margin-bottom: 16px; }
.dd-story-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; color: var(--berry); margin-bottom: 10px; }
.dd-story-text { font-size: 15px; line-height: 1.8; color: var(--ink); white-space: pre-wrap; }

.dd-steps { counter-reset: ddstep; }
.dd-step { display: flex; gap: 16px; margin-bottom: 18px; align-items: flex-start; }
.dd-step-num { counter-increment: ddstep; flex-shrink: 0; width: 36px; height: 36px; background: var(--leaf); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px; }
.dd-step-content { flex: 1; }
.dd-step-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.dd-step-text { font-size: 14px; line-height: 1.7; color: var(--ink); }
.dd-step-example { background: var(--paper); border-radius: 10px; padding: 12px 14px; margin-top: 8px; font-size: 14px; font-family: 'Nunito', sans-serif; border-left: 3px solid var(--marigold); color: var(--ink); }

.dd-visual { text-align: center; margin: 20px 0; }
.dd-visual svg { max-width: 100%; height: auto; border-radius: 12px; }
.dd-visual-caption { font-size: 12px; color: var(--ink-soft); margin-top: 8px; font-style: italic; }

.dd-video { margin: 20px 0; border-radius: 16px; overflow: hidden; background: var(--ink); }
.dd-video iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
.dd-video-caption { padding: 10px 16px; font-size: 12px; color: var(--ink-soft); background: var(--paper); }

.dd-tip { background: #FFF4D6; border-radius: 14px; padding: 18px 20px; border-left: 4px solid var(--gold); margin: 16px 0; }
.dd-tip-title { font-weight: 800; font-size: 13px; color: var(--gold); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.dd-tip-text { font-size: 14px; line-height: 1.6; color: var(--ink); }

.dd-funfact { background: linear-gradient(135deg, #FFF4D6 0%, #FFEEBB 100%); border-radius: 16px; padding: 20px 22px; border: 2px solid var(--gold); margin: 20px 0; display: flex; gap: 14px; align-items: flex-start; }
.dd-funfact-icon { font-size: 32px; flex-shrink: 0; }
.dd-funfact-content { flex: 1; }
.dd-funfact-label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
.dd-funfact-text { font-size: 15px; line-height: 1.6; color: var(--ink); font-weight: 600; }

.dd-rich-text { font-size: 15px; line-height: 1.8; color: var(--ink); white-space: pre-wrap; }
.dd-rich-text strong, .dd-rich-text b { font-weight: 700; color: var(--ink); }

/* === CONCEPT TEACHING CARDS (Math) === */
.concept-card { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 4px 16px var(--shadow); margin-bottom: 20px; border: 2px solid var(--paper-dark); }

          {
            "type": "visual",
            "svg": "<svg viewBox=\"0 0 700 220\" xmlns=\"http://www.w3.org/2000/svg\" style=\"font-family:Nunito,sans-serif;\"><rect width=\"700\" height=\"220\" rx=\"16\" fill=\"#FFF8EE\"/><text x=\"350\" y=\"30\" text-anchor=\"middle\" font-size=\"15\" font-weight=\"700\" fill=\"#2B1810\">Clue Words Decoder</text><g transform=\"translate(50,55)\"><rect x=\"0\" y=\"0\" width=\"280\" height=\"130\" rx=\"12\" fill=\"#4A7C59\" fill-opacity=\"0.12\" stroke=\"#4A7C59\" stroke-width=\"2\"/><text x=\"140\" y=\"28\" text-anchor=\"middle\" font-size=\"18\" font-weight=\"900\" fill=\"#4A7C59\">&#43; ADD</text><text x=\"140\" y=\"55\" text-anchor=\"middle\" font-size=\"13\" fill=\"#2B1810\">total</text><text x=\"140\" y=\"78\" text-anchor=\"middle\" font-size=\"13\" fill=\"#2B1810\">altogether</text><text x=\"140\" y=\"101\" text-anchor=\"middle\" font-size=\"13\" fill=\"#2B1810\">in all / combined</text><text x=\"140\" y=\"124\" text-anchor=\"middle\" font-size=\"13\" fill=\"#2B1810\">sum</text></g><g transform=\"translate(370,55)\"><rect x=\"0\" y=\"0\" width=\"280\" height=\"130\" rx=\"12\" fill=\"#B8385E\" fill-opacity=\"0.12\" stroke=\"#B8385E\" stroke-width=\"2\"/><text x=\"140\" y=\"28\" text-anchor=\"middle\" font-size=\"18\" font-weight=\"900\" fill=\"#B8385E\">&#8211; SUBTRACT</text><text x=\"140\" y=\"55\" text-anchor=\"middle\" font-size=\"13\" fill=\"#2B1810\">how many more</text><text x=\"140\" y=\"78\" text-anchor=\"middle\" font-size=\"13\" fill=\"#2B1810\">how many left</text><text x=\"140\" y=\"101\" text-anchor=\"middle\" font-size=\"13\" fill=\"#2B1810\">difference</text><text x=\"140\" y=\"124\" text-anchor=\"middle\" font-size=\"13\" fill=\"#2B1810\">remaining / fewer</text></g></svg>",
            "caption": "Clue words tell you whether to add or subtract"
          },
          {
            "type": "tip",
            "title": "Two-Step Problems",
            "content": "Some problems need **both** operations. Example: 'Sumit bought a car for Rs 6,85,385 and a fridge for Rs 38,965. He had Rs 7,50,000. How much is left?'\n\nStep 1 (ADD): 6,85,385 + 38,965 = 7,24,350 (total spent).\nStep 2 (SUBTRACT): 7,50,000 - 7,24,350 = 25,650 (money left)."
          },
          {
            "type": "funfact",
            "icon": "🚀",
            "content": "Scientists at ISRO solve giant word problems to launch rockets! They add up fuel, subtract weight, and calculate distances in lakhs of kilometres — all using the same add-and-subtract skills you are learning right now."
          }
        ]
      }
    ]
  }
}
</script>

<div class="container" id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <p style="color: var(--ink-soft); font-weight: 600;">Loading your chapter...</p>
  </div>
</div>

<script>
'use strict';

const App = {
  data: null,
  currentStage: 1,
  currentBranch: null,
  currentSection: null,
  currentPanelIdx: 0,
  currentVocabGroup: null,
  state: {
    panelChecks: {}, cardFlips: {}, spotItAnswers: {}, practiceAnswers: {},
    thinkSubmissions: {},      // p_id: { value, submitted }
    testAnswers: {},           // q_id: { value }
    testStartTime: null,       // null if not started
    testTimeUp: false,
    testSubmitted: false,
    spotItModal: null,
  },

  async init() {
    try {
      // Bind events ONCE at startup, before any rendering
      this.bindEvents();

      const embedded = document.getElementById('embedded-chapter');
      if (embedded && embedded.textContent.trim()) {
        try {
          this.data = JSON.parse(embedded.textContent.trim());
          this.loadProgress();
          this.render();
          return;
        } catch (e) { console.warn('Embedded JSON parse failed:', e.message); }
      }
      const params = new URLSearchParams(window.location.search);
      const chapter = params.get('chapter');
      const url = chapter ? `${chapter}.json` : 'content/class5/english/ch1-that-boy-next-door.json';
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Could not load: ${url} (status ${response.status})`);
      this.data = await response.json();
      this.validateSchema();
      this.loadProgress();
      this.render();
    } catch (err) { this.renderError(err.message); }
  },

  validateSchema() {
    const required = ['chapter_id', 'chapter_title', 'subject', 'stage_1_learn', 'stage_2_practice'];
    const missing = required.filter(f => !this.data[f]);
    if (missing.length > 0) throw new Error(`JSON missing fields: ${missing.join(', ')}`);
  },

  storageKey() { return `egurukul_${this.data.chapter_id}`; },

  // Bump this when schema or state shape changes — old state will be discarded
  STATE_VERSION: 6,

  loadProgress() {
    try {
      const saved = localStorage.getItem(this.storageKey());
      if (saved) {
        const p = JSON.parse(saved);
        if (p.stateVersion !== this.STATE_VERSION) {
          console.log('Old state version detected, starting fresh');
          localStorage.removeItem(this.storageKey());
          return;
        }
        this.state.panelChecks = p.panelChecks || {};
        this.state.cardFlips = p.cardFlips || {};
        this.state.spotItAnswers = p.spotItAnswers || {};
        this.state.practiceAnswers = p.practiceAnswers || {};
        this.state.thinkSubmissions = p.thinkSubmissions || {};
        this.state.testAnswers = p.testSubmitted ? (p.testAnswers || {}) : {};
        this.state.testSubmitted = p.testSubmitted || false;
        this.state.manualMarksAwarded = p.manualMarksAwarded || {};
        this.currentStage = p.currentStage || 1;
        if (this.currentStage < 1) this.currentStage = 1; // Never restore to Stage 0 (Deep Dive)
      }
    } catch (e) { console.warn(e); }
  },

  saveProgress() {
    try {
      localStorage.setItem(this.storageKey(), JSON.stringify({
        stateVersion: this.STATE_VERSION,
        panelChecks: this.state.panelChecks,
        cardFlips: this.state.cardFlips,
        spotItAnswers: this.state.spotItAnswers,
        practiceAnswers: this.state.practiceAnswers,
        thinkSubmissions: this.state.thinkSubmissions,
        testAnswers: this.state.testSubmitted ? this.state.testAnswers : {},
        testSubmitted: this.state.testSubmitted,
        manualMarksAwarded: this.state.manualMarksAwarded || {},
        currentStage: this.currentStage,
      }));
    } catch (e) { console.warn(e); }
  },

  resetProgress() {
    if (confirm('Reset all your progress in this chapter? You will start fresh from Stage 1.')) {
      localStorage.removeItem(this.storageKey());
      this.state.panelChecks = {};
      this.state.cardFlips = {};
      this.state.spotItAnswers = {};
      this.state.practiceAnswers = {};
      this.state.thinkSubmissions = {};
      this.state.testAnswers = {};
      this.state.testStartTime = null;
      this.state.testTimeUp = false;
      this.state.testSubmitted = false;
      this.state.manualMarksAwarded = {};
      this.currentStage = 1;
      this.currentBranch = null;
      this.currentSection = null;
      this.currentPanelIdx = 0;
      this.currentVocabGroup = null;
      this.deepDiveTopicIdx = 0;
      this.previousStage = 1;
      this.stopTimer();
      this.render();
      window.scrollTo(0, 0);
    }
  },

  isBranchComplete(branch) {
    if (branch.type === 'story_panels') {
      return branch.panels.every(p => !p.comprehension_check || (this.state.panelChecks[p.id] && this.state.panelChecks[p.id].selected !== undefined));
    }
    if (branch.type === 'vocabulary_cards') {
      return branch.cards.every(c => this.state.spotItAnswers[c.id] !== undefined);
    }
    if (branch.type === 'concept_teaching') {
      return branch.cards.every(c => !c.check || (this.state.panelChecks[c.id] && this.state.panelChecks[c.id].selected !== undefined));
    }
    return false;
  },

  countAnsweredPanels(branch) {
    if (!branch.panels) return 0;
    return branch.panels.filter(p =>
      !p.comprehension_check ||
      (this.state.panelChecks[p.id] && this.state.panelChecks[p.id].selected !== undefined)
    ).length;
  },

  isStage1Complete() { return this.data.stage_1_learn.branches.every(b => this.isBranchComplete(b)); },

  isPracticeSectionComplete(section) {
    return section.questions.every(q => this.state.practiceAnswers[q.id] && this.state.practiceAnswers[q.id].selected !== undefined);
  },

  isStage2Complete() { return this.data.stage_2_practice.sections.every(s => this.isPracticeSectionComplete(s)); },

  isStage3Complete() {
    const problems = this.data.stage_3_think.problems;
    return problems.every(p => this.state.thinkSubmissions[p.id] && this.state.thinkSubmissions[p.id].submitted);
  },

  isStage4Complete() { return this.state.testSubmitted; },

  isStageComplete(n) {
    if (n === 1) return this.isStage1Complete();
    if (n === 2) return this.isStage2Complete();
    if (n === 3) return this.isStage3Complete();
    if (n === 4) return this.isStage4Complete();
    return false;
  },

  isStageUnlocked(n) {
    if (n === 1) return true;
    return this.isStageComplete(n - 1);
  },

  render() {
    const app = document.getElementById('app');
    const hasDeepDive = this.data.stage_0_deep_dive && this.data.stage_0_deep_dive.topics && this.data.stage_0_deep_dive.topics.length > 0;
    app.innerHTML = `
      ${this.renderHeader()}
      ${this.currentStage === 0 ? '' : (hasDeepDive ? this.renderDeepDiveTrigger() : '')}
      ${this.currentStage === 0 ? '' : this.renderProgressBar()}
      <div>
        ${this.currentStage === 0 ? this.renderStage0() : ''}
        ${this.currentStage === 1 ? this.renderStage1() : ''}
        ${this.currentStage === 2 ? this.renderStage2() : ''}
        ${this.currentStage === 3 ? this.renderStage3() : ''}
        ${this.currentStage === 4 ? this.renderStage4() : ''}
      </div>
      ${this.state.spotItModal ? this.renderSpotItModal() : ''}
    `;
    // Execute deferred JS for interactive Deep Dive sections (global scope so inline onclick works)
    app.querySelectorAll('.dd-deferred-js').forEach(el => {
      try {
        const js = el.textContent;
        if (js && js.trim()) {
          const s = document.createElement('script');
          s.textContent = js;
          document.body.appendChild(s);
          s.remove();
        }
      } catch(e) { console.warn('Interactive JS error:', e); }
      el.remove();
    });
    // bindEvents is now called ONCE in init(), not here
  },

  renderError(msg) {
    document.getElementById('app').innerHTML = `
      <div class="error-screen">
        <h2 style="font-family: 'Fraunces', serif; margin-bottom: 12px;">Couldn't load the chapter</h2>
        <p>${this.escapeHtml(msg)}</p>
        <p style="font-size: 13px; margin-top: 12px;">Make sure the JSON file is in the same folder, or paste it inside the embedded-chapter script tag.</p>
      </div>
    `;
  },

  renderHeader() {
    const d = this.data;
    let title = d.chapter_title;
    if (d.chapter_number) title = `Chapter ${d.chapter_number} — ${title}`;
    return `
      <header class="app-header">
        <div class="header-eyebrow">${this.escapeHtml(d.subject || '')} · Class 5</div>
        <h1 class="header-title">${this.escapeHtml(title)}</h1>
        ${d.chapter_author ? `<div class="header-author">by ${this.escapeHtml(d.chapter_author)}</div>` : ''}
        <button class="reset-btn" data-reset-progress="1" title="Clear all progress and start fresh">↻ Reset</button>
      </header>
    `;
  },

  renderProgressBar() {
    const stages = [{num:1,label:'Learn'},{num:2,label:'Practice'},{num:3,label:'Think'},{num:4,label:'Test'}];
    return `<div class="progress-bar">${stages.map(s => {
      const isActive = this.currentStage === s.num;
      const isComplete = this.isStageComplete(s.num);
      const isLocked = !this.isStageUnlocked(s.num) && !isActive;
      let cls = '';
      if (isActive) cls = 'active';
      else if (isComplete) cls = 'complete';
      else if (isLocked) cls = 'locked';
      return `<div class="progress-step ${cls}" data-stage="${s.num}"><span class="step-num">${s.num}</span><span>${s.label}</span></div>`;
    }).join('')}</div>`;
  },

  renderDeepDiveTrigger() {
    const dd = this.data.stage_0_deep_dive;
    return `
      <button class="deep-dive-trigger" data-open-deep-dive="1">
        <span class="dd-icon">📚</span>
        <span class="dd-text">
          <span class="dd-title">${this.escapeHtml(dd.title || 'Deep Dive — Concept Reference')}</span>
          <span class="dd-sub">${this.escapeHtml(dd.description || 'Detailed explanations, stories & visuals — always available for reference')}</span>
        </span>
      </button>
    `;
  },

  renderStage0() {
    const dd = this.data.stage_0_deep_dive;
    if (!dd || !dd.topics || dd.topics.length === 0) return '';
    const currentIdx = this.deepDiveTopicIdx || 0;
    const topic = dd.topics[currentIdx];

    return `
      <div class="dd-screen">
        <div class="dd-header">
          <button class="btn btn-secondary" data-close-deep-dive="1">← Back to Dashboard</button>
          <div>
            <h2 class="stage-title" style="font-size:22px;margin:0;">📚 ${this.escapeHtml(dd.title || 'Deep Dive')}</h2>
            <p class="stage-description" style="font-size:13px;">${this.escapeHtml(dd.description || '')}</p>
          </div>
        </div>
        <div class="dd-nav">
          ${dd.topics.map((t, i) => `
            <button class="dd-nav-btn ${i === currentIdx ? 'active' : ''}" data-dd-topic="${i}">
              ${t.icon || '📖'} ${this.escapeHtml(t.title)}
            </button>
          `).join('')}
        </div>
        <div class="dd-topic">
          <div class="dd-topic-title">${topic.icon || ''} ${this.escapeHtml(topic.title)}</div>
          ${topic.subtitle ? `<div class="dd-topic-subtitle">${this.escapeHtml(topic.subtitle)}</div>` : ''}
          ${(topic.sections || []).map(sec => this.renderDeepDiveSection(sec)).join('')}
        </div>
        <div class="panel-nav">
          <button class="btn btn-secondary" data-dd-topic="${currentIdx - 1}" ${currentIdx === 0 ? 'disabled' : ''}>← Previous Topic</button>
          ${currentIdx < dd.topics.length - 1
            ? `<button class="btn btn-primary" data-dd-topic="${currentIdx + 1}">Next Topic →</button>`
            : `<button class="btn btn-success" data-close-deep-dive="1">✓ Back to Dashboard</button>`
          }
        </div>
      </div>
    `;
  },

  renderDeepDiveSection(sec) {
    if (sec.type === 'story') {
      return `
        <div class="dd-section">
          <span class="dd-section-label story">📖 Story</span>
          <div class="dd-story">
            ${sec.title ? `<div class="dd-story-title">${this.escapeHtml(sec.title)}</div>` : ''}
            <div class="dd-story-text">${this.renderDDText(sec.content)}</div>
          </div>
          ${sec.image_svg ? `<div class="dd-visual">${sec.image_svg}${sec.image_caption ? `<div class="dd-visual-caption">${this.escapeHtml(sec.image_caption)}</div>` : ''}</div>` : ''}
        </div>
      `;
    }
    if (sec.type === 'steps') {
      return `
        <div class="dd-section">
          <span class="dd-section-label steps">🪜 Step by Step</span>
          ${sec.title ? `<h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:14px;color:var(--ink);">${this.escapeHtml(sec.title)}</h4>` : ''}
          <div class="dd-steps">
            ${(sec.steps || []).map((step, i) => `
              <div class="dd-step">
                <div class="dd-step-num">${i + 1}</div>
                <div class="dd-step-content">
                  <div class="dd-step-title">${this.escapeHtml(step.title)}</div>
                  <div class="dd-step-text">${this.renderDDText(step.text)}</div>
                  ${step.example ? `<div class="dd-step-example">💡 ${this.renderDDText(step.example)}</div>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
    if (sec.type === 'visual') {
      return `
        <div class="dd-section">
          <span class="dd-section-label visual">🎨 Visual</span>
          <div class="dd-visual">
            ${sec.svg || ''}
            ${sec.caption ? `<div class="dd-visual-caption">${this.escapeHtml(sec.caption)}</div>` : ''}
          </div>
        </div>
      `;
    }
    if (sec.type === 'video') {
      return `
        <div class="dd-section">
          <span class="dd-section-label video">🎬 Video</span>
          ${sec.title ? `<h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:14px;color:var(--ink);">${this.escapeHtml(sec.title)}</h4>` : ''}
          <div class="dd-video">
            <iframe src="${this.escapeAttr(sec.url)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>
            ${sec.caption ? `<div class="dd-video-caption">${this.escapeHtml(sec.caption)}</div>` : ''}
          </div>
        </div>
      `;
    }
    if (sec.type === 'video_embedded') {
      return `
        <div class="dd-section">
          <span class="dd-section-label video">🎬 Video</span>
          ${sec.title ? `<h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:14px;color:var(--ink);">${this.escapeHtml(sec.title)}</h4>` : ''}
          <div class="dd-video">
            <video controls playsinline preload="metadata" style="width:100%;border-radius:12px;">
              <source src="${sec.data_url || ''}" type="video/webm">
              <source src="${sec.data_url || ''}" type="video/mp4">
              Your browser does not support embedded video.
            </video>
            ${sec.caption ? `<div class="dd-video-caption">${this.escapeHtml(sec.caption)}</div>` : ''}
          </div>
        </div>
      `;
    }
    if (sec.type === 'tip') {
      return `
        <div class="dd-section">
          <div class="dd-tip">
            <div class="dd-tip-title">💡 ${this.escapeHtml(sec.title || 'Remember')}</div>
            <div class="dd-tip-text">${this.renderDDText(sec.content)}</div>
          </div>
        </div>
      `;
    }
    if (sec.type === 'text') {
      return `
        <div class="dd-section">
          ${sec.label ? `<span class="dd-section-label tip">${this.escapeHtml(sec.label)}</span>` : ''}
          ${sec.title ? `<h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px;color:var(--ink);">${this.escapeHtml(sec.title)}</h4>` : ''}
          <div class="dd-rich-text">${this.renderDDText(sec.content)}</div>
        </div>
      `;
    }
    if (sec.type === 'funfact') {
      return `
        <div class="dd-section">
          <div class="dd-funfact">
            <span class="dd-funfact-icon">${sec.icon || '🤯'}</span>
            <div class="dd-funfact-content">
              <div class="dd-funfact-label">Did You Know?</div>
              <div class="dd-funfact-text">${this.renderDDText(sec.content)}</div>
            </div>
          </div>
        </div>
      `;
    }
    if (sec.type === 'interactive') {
      const safeId = 'dd-int-' + Math.random().toString(36).substr(2, 8);
      return `
        <div class="dd-section">
          <span class="dd-section-label visual">🎮 Interactive</span>
          ${sec.title ? `<h4 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:14px;color:var(--ink);">${this.escapeHtml(sec.title)}</h4>` : ''}
          <div class="dd-interactive" id="${safeId}">${sec.html || ''}</div>
          ${sec.js ? `<div class="dd-deferred-js" style="display:none;" data-target="${safeId}">${this.escapeHtml(sec.js)}</div>` : ''}
        </div>
      `;
    }
    return '';
  },

  renderDDText(text) {
    if (!text) return '';
    // Simple markdown-like rendering: **bold**, *italic*, `code`, \n for line breaks
    let html = this.escapeHtml(text);
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/`(.+?)`/g, '<code style="background:var(--paper-dark);padding:2px 6px;border-radius:4px;font-size:0.9em;">$1</code>');
    return html;
  },

  renderStage1() {
    const s = this.data.stage_1_learn;
    if (this.currentBranch) {
      const branch = s.branches.find(b => b.id === this.currentBranch);
      if (branch) {
        if (branch.type === 'story_panels') return this.renderStoryPanelView(branch);
        if (branch.type === 'vocabulary_cards') return this.renderVocabCardsView(branch);
        if (branch.type === 'concept_teaching') return this.renderConceptTeachingView(branch);
      }
    }
    const s1Stars = this.computeStage1Stars();
    return `
      <div class="stage-header">
        <h2 class="stage-title">${this.escapeHtml(s.title)}</h2>
        <p class="stage-description">${this.escapeHtml(s.description)} · <strong>⭐ ${s1Stars.earned} / ${s1Stars.total}</strong></p>
      </div>
      <div class="branches-grid">${s.branches.map(b => {
        const complete = this.isBranchComplete(b);
        let progress = '';
        if (b.type === 'story_panels') {
          const total = b.panels.length;
          const done = b.panels.filter(p => !p.comprehension_check || (this.state.panelChecks[p.id] && this.state.panelChecks[p.id].selected !== undefined)).length;
          progress = `${done} / ${total} panels`;
        } else if (b.type === 'vocabulary_cards') {
          const total = b.cards.length;
          const done = b.cards.filter(c => this.state.spotItAnswers[c.id] !== undefined).length;
          progress = `${done} / ${total} words`;
        } else if (b.type === 'concept_teaching') {
          const total = b.cards.length;
          const done = b.cards.filter(c => !c.check || (this.state.panelChecks[c.id] && this.state.panelChecks[c.id].selected !== undefined)).length;
          progress = `${done} / ${total} concepts`;
        }
        let starDisplay = '';
        if (b.type === 'concept_teaching' && b.cards) {
          const totalStars = b.cards.filter(c => c.check).length;
          const earnedStars = b.cards.filter(c => {
            if (!c.check) return false;
            const a = this.state.panelChecks[c.id];
            return a && a.selected === c.check.correct;
          }).length;
          starDisplay = `${earnedStars} / ${totalStars} ⭐`;
        } else {
          starDisplay = `${b.marks} marks`;
        }
        return `<div class="branch-card ${complete ? 'complete' : ''}" data-enter-branch="${this.escapeAttr(b.id)}">
          <div class="branch-icon">${b.icon || '📖'}</div>
          <div class="branch-title">${this.escapeHtml(b.title)}</div>
          <div class="branch-meta">${starDisplay}</div>
          <div class="branch-progress">${progress}</div>
        </div>`;
      }).join('')}</div>
      ${this.renderStageNav()}
    `;
  },

  renderStoryPanelView(branch) {
    const idx = this.currentPanelIdx;
    const panel = branch.panels[idx];
    const total = branch.panels.length;
    const check = this.state.panelChecks[panel.id] || {};
    const isAnswered = check.selected !== undefined;

    return `
      <div class="stage-header" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-secondary" data-back-to-branches="1">← Back</button>
        <div>
          <h2 class="stage-title" style="font-size:22px;margin:0;">${this.escapeHtml(branch.title)}</h2>
          <p class="stage-description" style="font-size:13px;">${this.escapeHtml(branch.story_title || '')}${branch.story_author ? ' · by ' + this.escapeHtml(branch.story_author) : ''}</p>
        </div>
      </div>
      <div class="panel-dots">
        ${branch.panels.map((p, i) => {
          const answered = !p.comprehension_check || (this.state.panelChecks[p.id] && this.state.panelChecks[p.id].selected !== undefined);
          const isCurrent = i === idx;
          let cls = 'panel-dot';
          if (isCurrent) cls += ' current';
          if (answered) cls += ' answered';
          return `<button class="${cls}" data-jump-to-panel="${i}" title="Panel ${i+1}: ${this.escapeAttr(p.panel_title)}">${i+1}${answered ? ' ✓' : ''}</button>`;
        }).join('')}
      </div>
      <div class="panel-container">
        <div class="panel-meta">
          <span class="panel-counter">Panel ${idx + 1} of ${total}</span>
          <span style="font-size:11px;color:var(--ink-soft);font-weight:700;">${this.countAnsweredPanels(branch)} of ${total} checks answered</span>
        </div>
        <h3 class="panel-title">${this.escapeHtml(panel.panel_title)}</h3>
        <div class="narration-text">${this.renderNarrationWithHighlights(panel)}</div>
        ${panel.comprehension_check ? this.renderComprehensionCheck(panel) : ''}
      </div>
      <div class="panel-nav">
        ${idx > 0 ? `<button class="btn btn-secondary" data-panel-nav="prev">← Previous Panel</button>` : `<button class="btn btn-secondary" disabled>← Previous Panel</button>`}
        ${idx < total - 1
          ? `<button class="btn btn-primary" data-panel-nav="next" ${panel.comprehension_check && !isAnswered ? 'disabled' : ''}>Next Panel →</button>`
          : `<button class="btn btn-success" data-panel-nav="finish-branch" ${!this.isBranchComplete(branch) ? 'disabled' : ''}>${this.isBranchComplete(branch) ? '✓ Finish ' + this.escapeHtml(branch.title) : 'Answer all panels to finish'}</button>`}
      </div>
    `;
  },

  renderNarrationWithHighlights(panel) {
    let text = panel.narration_text;
    if (panel.highlighted_words && panel.highlighted_words.length > 0) {
      const sorted = [...panel.highlighted_words].sort((a, b) => b.word.length - a.word.length);
      sorted.forEach((hw) => {
        const escaped = hw.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`\\b(${escaped})\\b`, 'gi');
        const dataIdx = panel.highlighted_words.indexOf(hw);
        text = text.replace(regex, (match) => `<span class="highlight-word" data-word-idx="${dataIdx}" data-panel-id="${this.escapeAttr(panel.id)}">${match}</span>`);
      });
    }
    return text;
  },

  renderComprehensionCheck(panel) {
    const check = panel.comprehension_check;
    const ans = this.state.panelChecks[panel.id] || {};
    const isAnswered = ans.selected !== undefined;
    return `
      <div class="comprehension-check">
        <span class="check-label">Quick Check${check.marks ? ' · ' + check.marks + ' marks' : ''}</span>
        <p class="check-question">${this.escapeHtml(check.question)}</p>
        <ul class="options-list">${check.options.map((opt, i) => {
          let cls = 'option-btn';
          if (isAnswered) {
            if (i === check.correct) cls += ' correct';
            else if (i === ans.selected) cls += ' incorrect';
          }
          return `<li><button class="${cls}" data-panel-check="${this.escapeAttr(panel.id)}" data-opt="${i}" ${isAnswered ? 'disabled' : ''}>
            <span class="option-letter">${String.fromCharCode(65 + i)}</span><span>${this.escapeHtml(opt)}</span>
          </button></li>`;
        }).join('')}</ul>
        ${isAnswered && check.explanation ? `
          <div class="feedback-box explanation">
            <span class="feedback-label">${ans.selected === check.correct ? '✓ Correct!' : "Let's understand"}</span>
            ${this.escapeHtml(check.explanation)}
          </div>` : ''}
      </div>
    `;
  },

  renderVocabCardsView(branch) {
    // Group cards by source for cleaner browsing
    const groups = {};
    branch.cards.forEach(c => {
      const src = c.source || 'Words';
      if (!groups[src]) groups[src] = [];
      groups[src].push(c);
    });

    // If we don't have a sub-view selected, default to first group
    const sources = Object.keys(groups);
    if (!this.currentVocabGroup || !groups[this.currentVocabGroup]) {
      this.currentVocabGroup = sources[0];
    }
    const activeCards = groups[this.currentVocabGroup] || [];

    // Group completion stats
    const groupTabs = sources.map(src => {
      const cards = groups[src];
      const done = cards.filter(c => this.state.spotItAnswers[c.id] !== undefined).length;
      const isActive = src === this.currentVocabGroup;
      return `<button class="vocab-group-tab ${isActive ? 'active' : ''}" data-vocab-group="${this.escapeAttr(src)}">
        ${this.escapeHtml(src)} <span style="opacity:0.7;font-size:11px;">(${done}/${cards.length})</span>
      </button>`;
    }).join('');

    return `
      <div class="stage-header" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-secondary" data-back-to-branches="1">← Back</button>
        <div>
          <h2 class="stage-title" style="font-size:22px;margin:0;">${this.escapeHtml(branch.title)}</h2>
          <p class="stage-description" style="font-size:13px;">Tap each card to see meaning, then test yourself with "Spot it!"</p>
        </div>
      </div>
      <div class="vocab-group-tabs">${groupTabs}</div>
      <div class="cards-grid">${activeCards.map(c => this.renderVocabCard(c)).join('')}</div>
      <div class="stage-nav">
        <div></div>
        <button class="btn ${this.isBranchComplete(branch) ? 'btn-success' : 'btn-secondary'}" data-back-to-branches="1">${this.isBranchComplete(branch) ? '✓ Branch Complete · Back' : 'Save & Back'}</button>
      </div>
    `;
  },

  renderVocabCard(card) {
    const flipped = this.state.cardFlips[card.id];
    const spotAnswered = this.state.spotItAnswers[card.id] !== undefined;
    return `
      <div class="vocab-card ${flipped ? 'flipped' : ''} ${spotAnswered ? 'complete' : ''}" data-flip-card="${this.escapeAttr(card.id)}">
        <div class="vocab-card-inner">
          <div class="vocab-face front">
            <div class="vocab-source-tag">${this.escapeHtml(card.source || 'Word')}</div>
            <div class="vocab-word">${this.escapeHtml(card.word)}</div>
            <div class="vocab-flip-hint">Tap to reveal</div>
          </div>
          <div class="vocab-face back">
            <div class="vocab-meaning">${this.escapeHtml(card.meaning)}</div>
            ${card.example_from_story ? `<div><span class="vocab-example-label">From the story</span><p class="vocab-example">${this.escapeHtml(card.example_from_story)}</p></div>` : ''}
            ${card.indian_context_example ? `<div style="margin-top:6px;"><span class="vocab-example-label">Example</span><p class="vocab-example">${this.escapeHtml(card.indian_context_example)}</p></div>` : ''}
            ${card.spot_it ? `<div class="spot-it-cta" data-open-spot-it="${this.escapeAttr(card.id)}">${spotAnswered ? '✓ Spot it answered' : '🎯 Spot it! Tap to test yourself'}</div>` : ''}
          </div>
        </div>
      </div>
    `;
  },

  renderSpotItModal() {
    const cardId = this.state.spotItModal;
    let card = null;
    for (const branch of this.data.stage_1_learn.branches) {
      if (branch.cards) { card = branch.cards.find(c => c.id === cardId); if (card) break; }
    }
    if (!card || !card.spot_it) return '';
    const ans = this.state.spotItAnswers[card.id];
    const spot = card.spot_it;
    const isAnswered = ans !== undefined;
    return `
      <div class="modal-overlay" data-close-modal="1">
        <div class="modal-content" data-stop-propagation="1">
          <div class="modal-title">Spot it: <span class="modal-word">${this.escapeHtml(card.word)}</span></div>
          <p style="margin:12px 0 16px 0;color:var(--ink-soft);font-size:14px;">${this.escapeHtml(spot.question)}</p>
          <ul class="options-list">${spot.options.map((opt, i) => {
            let cls = 'option-btn';
            if (isAnswered) {
              if (i === spot.correct) cls += ' correct';
              else if (i === ans.selected) cls += ' incorrect';
            }
            return `<li><button class="${cls}" data-spot-answer="${this.escapeAttr(card.id)}" data-opt="${i}" ${isAnswered ? 'disabled' : ''}>
              <span class="option-letter">${String.fromCharCode(65 + i)}</span><span>${this.escapeHtml(opt)}</span>
            </button></li>`;
          }).join('')}</ul>
          ${isAnswered ? `
            <div class="feedback-box explanation" style="margin-bottom:12px;">
              <span class="feedback-label">${ans.selected === spot.correct ? '✓ Correct!' : 'Not quite — see the right answer above'}</span>
            </div>
            <button class="btn btn-primary" data-close-modal="1" style="width:100%;">Continue</button>
          ` : ''}
        </div>
      </div>
    `;
  },

  renderConceptTeachingView(branch) {
    const cards = branch.cards || [];
    const currentCard = cards[this.currentPanelIdx] || cards[0];
    if (!currentCard) return '';
    const idx = this.currentPanelIdx;
    const total = cards.length;
    const isAnswered = currentCard.check && this.state.panelChecks[currentCard.id] && this.state.panelChecks[currentCard.id].selected !== undefined;
    const ans = this.state.panelChecks[currentCard.id] || {};
    const isCorrect = isAnswered && ans.selected === currentCard.check.correct;
    const isLast = idx === total - 1;
    const allDone = this.isBranchComplete(branch);
    // Count stars earned (1 per correct quick check)
    const starsEarned = cards.filter(c => {
      if (!c.check) return false;
      const a = this.state.panelChecks[c.id];
      return a && a.selected === c.check.correct;
    }).length;

    return `
      <div class="stage-header" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-secondary" data-back-to-branches="1">← Back</button>
        <div>
          <h2 class="stage-title" style="font-size:22px;margin:0;">${this.escapeHtml(branch.title)}</h2>
          ${branch.concept_title ? `<p class="stage-description" style="font-size:13px;">${this.escapeHtml(branch.concept_title)}</p>` : ''}
        </div>
        <span class="marks-tag">⭐ ${starsEarned} / ${total}</span>
      </div>
      ${branch.intro ? `<p style="color:var(--ink-soft);font-size:14px;margin-bottom:16px;">${this.escapeHtml(branch.intro)}</p>` : ''}
      <div class="panel-dots">
        ${cards.map((c, i) => {
          const done = c.check && this.state.panelChecks[c.id] && this.state.panelChecks[c.id].selected !== undefined;
          const correct = done && this.state.panelChecks[c.id].selected === c.check.correct;
          const cls = i === idx ? (done ? 'current answered' : 'current') : (done ? 'answered' : '');
          return `<button class="panel-dot ${cls}" data-jump-to-panel="${i}">${i + 1}${correct ? ' ⭐' : (done ? ' ✗' : '')}</button>`;
        }).join('')}
      </div>
      <div class="concept-card ${isAnswered ? 'answered' : ''}">
        <div class="panel-meta">
          <span class="panel-counter">Concept ${idx + 1} of ${total}</span>
        </div>
        <div class="concept-name">${this.escapeHtml(currentCard.concept_name)}</div>
        <div class="concept-definition">${this.escapeHtml(currentCard.definition)}</div>
        ${currentCard.examples && currentCard.examples.length > 0 ? `
          <div class="concept-examples">
            <span class="concept-examples-label">Examples</span>
            ${currentCard.examples.map(ex => `<div class="concept-example-item">• ${this.escapeHtml(ex)}</div>`).join('')}
          </div>
        ` : ''}
        ${currentCard.check ? `
          <div class="concept-check">
            <span class="check-label">Quick Check</span>
            <p class="check-question">${this.escapeHtml(currentCard.check.question)}</p>
            <ul class="options-list">${currentCard.check.options.map((opt, i) => {
              let cls = '';
              if (isAnswered) {
                if (i === currentCard.check.correct) cls = 'correct';
                else if (i === ans.selected && i !== currentCard.check.correct) cls = 'incorrect';
              }
              return `<li><button class="option-btn ${cls}" data-panel-check="${this.escapeAttr(currentCard.id)}" data-opt="${i}" ${isAnswered ? 'disabled' : ''}>
                <span class="option-letter">${String.fromCharCode(65 + i)}</span><span>${this.escapeHtml(opt)}</span>
              </button></li>`;
            }).join('')}</ul>
            ${isAnswered ? `
              <div class="feedback-box ${isCorrect ? 'explanation' : 'hint'}">
                <span class="feedback-label">${isCorrect ? '✓ Correct! ⭐ Star earned!' : '✗ That\'s not right. Here\'s why:'}</span>
                ${this.escapeHtml(currentCard.check.explanation || '')}
                ${!isCorrect ? `<div style="margin-top:12px;padding:14px;background:rgba(74,124,89,0.08);border-radius:10px;border-left:4px solid var(--leaf);">
                  <strong style="color:var(--leaf);">✅ The correct answer is ${String.fromCharCode(65 + currentCard.check.correct)}: ${this.escapeHtml(currentCard.check.options[currentCard.check.correct])}</strong>
                  <p style="margin-top:8px;font-size:14px;line-height:1.6;color:var(--ink);">You chose ${String.fromCharCode(65 + ans.selected)}: ${this.escapeHtml(currentCard.check.options[ans.selected])}. Go through the explanation above step by step. If it's still not clear, tap <strong>← Previous</strong> to re-read the concept card, then come back.</p>
                </div>` : ''}
              </div>
            ` : ''}
          </div>
        ` : ''}
      </div>
      <div class="panel-nav">
        <button class="btn btn-secondary" data-panel-nav="prev" ${idx === 0 ? 'disabled' : ''}>← Previous</button>
        ${isLast
          ? `<button class="btn ${allDone ? 'btn-success' : 'btn-primary'}" data-panel-nav="finish-branch">${allDone ? '✓ Done' : 'Back to Topics'}</button>`
          : `<button class="btn btn-primary" data-panel-nav="next">Next →</button>`
        }
      </div>
    `;
  },

  renderStage2() {
    if (!this.isStageUnlocked(2)) {
      return `
        <div class="placeholder-card">
          <div class="placeholder-icon">🔒</div>
          <div class="placeholder-title">Complete Stage 1 First</div>
          <p class="placeholder-detail">Finish all three branches in Learn before moving to Practice.</p>
        </div>
        ${this.renderStageNav()}
      `;
    }
    const s = this.data.stage_2_practice;
    if (this.currentSection) {
      const section = s.sections.find(sec => sec.id === this.currentSection);
      if (section) return this.renderPracticeSectionView(section);
    }
    const s2Stars = this.computeStage2Stars();
    return `
      <div class="stage-header">
        <h2 class="stage-title">${this.escapeHtml(s.title)}</h2>
        <p class="stage-description">${this.escapeHtml(s.description)} · <strong>⭐ ${s2Stars.earned} / ${s2Stars.total}</strong></p>
      </div>
      <div class="branches-grid">${s.sections.map(sec => {
        const complete = this.isPracticeSectionComplete(sec);
        const total = sec.questions.length;
        const done = sec.questions.filter(q => this.state.practiceAnswers[q.id] && this.state.practiceAnswers[q.id].selected !== undefined).length;
        const correct = sec.questions.filter(q => {
          const a = this.state.practiceAnswers[q.id];
          return a && a.selected === q.correct;
        }).length;
        return `<div class="branch-card ${complete ? 'complete' : ''}" data-enter-section="${this.escapeAttr(sec.id)}">
          <div class="branch-icon">${sec.icon || '📑'}</div>
          <div class="branch-title">${this.escapeHtml(sec.title)}</div>
          <div class="branch-meta">${correct} / ${total} ⭐</div>
          <div class="branch-progress">${done} / ${total} answered</div>
        </div>`;
      }).join('')}</div>
      ${this.renderStageNav()}
    `;
  },

  renderPracticeSectionView(section) {
    const correct = section.questions.filter(q => {
      const a = this.state.practiceAnswers[q.id];
      return a && a.selected === q.correct;
    }).length;
    return `
      <div class="stage-header" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-secondary" data-back-to-sections="1">← Back</button>
        <div>
          <h2 class="stage-title" style="font-size:22px;margin:0;">${this.escapeHtml(section.title)}</h2>
          <p class="stage-description" style="font-size:13px;">${section.questions.length} questions · ⭐ ${correct} / ${section.questions.length}</p>
        </div>
      </div>
      ${section.questions.map((q, i) => this.renderPracticeQuestion(q, i + 1)).join('')}
      <div class="stage-nav">
        <div></div>
        <button class="btn ${this.isPracticeSectionComplete(section) ? 'btn-success' : 'btn-secondary'}" data-back-to-sections="1">${this.isPracticeSectionComplete(section) ? '✓ Section Complete · Back' : 'Save & Back'}</button>
      </div>
    `;
  },

  renderPracticeQuestion(q, num) {
    const ans = this.state.practiceAnswers[q.id] || {};
    const isAnswered = ans.selected !== undefined;
    return `
      <div class="question-card">
        <div>
          <span class="question-number">${num}</span>
          ${q.category ? `<span style="display:inline-block;margin-left:10px;padding:4px 12px;background:var(--paper-dark);border-radius:12px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);vertical-align:middle;">${this.escapeHtml(q.category)}</span>` : ''}
        </div>
        ${q.passage_excerpt ? `<div class="passage-excerpt">${this.escapeHtml(q.passage_excerpt)}</div>` : ''}
        <p class="question-text">${this.escapeHtml(q.question)}</p>
        <ul class="options-list">${q.options.map((opt, i) => {
          let cls = 'option-btn';
          if (isAnswered) {
            if (i === q.correct) cls += ' correct';
            else if (i === ans.selected) cls += ' incorrect';
          }
          return `<li><button class="${cls}" data-practice-answer="${this.escapeAttr(q.id)}" data-opt="${i}" ${isAnswered ? 'disabled' : ''}>
            <span class="option-letter">${String.fromCharCode(65 + i)}</span><span>${this.escapeHtml(opt)}</span>
          </button></li>`;
        }).join('')}</ul>
        ${!isAnswered && q.hint ? `<div class="question-actions"><button class="btn btn-secondary" data-show-hint="${this.escapeAttr(q.id)}">💡 Show hint</button></div>` : ''}
        ${ans.showHint && q.hint ? `<div class="feedback-box hint"><span class="feedback-label">Hint</span>${this.escapeHtml(q.hint)}</div>` : ''}
        ${isAnswered && q.explanation ? `<div class="feedback-box ${ans.selected === q.correct ? 'explanation' : 'hint'}">
          <span class="feedback-label">${ans.selected === q.correct ? '✓ Correct! ⭐' : '✗ That\'s not right. Here\'s why:'}</span>
          ${this.escapeHtml(q.explanation)}
          ${ans.selected !== q.correct ? `<div style="margin-top:12px;padding:14px;background:rgba(74,124,89,0.08);border-radius:10px;border-left:4px solid var(--leaf);">
            <strong style="color:var(--leaf);">✅ The correct answer is ${String.fromCharCode(65 + q.correct)}: ${this.escapeHtml(q.options[q.correct])}</strong>
            <p style="margin-top:8px;font-size:14px;line-height:1.6;color:var(--ink);">You chose ${String.fromCharCode(65 + ans.selected)}: ${this.escapeHtml(q.options[ans.selected])}. Read the explanation above carefully to understand the difference.</p>
          </div>` : ''}
        </div>` : ''}
      </div>
    `;
  },

  // ============================================================
  // STAGE 3: THINK DEEPER
  // ============================================================
  renderStage3() {
    if (!this.isStageUnlocked(3)) {
      return `
        <div class="placeholder-card">
          <div class="placeholder-icon">🔒</div>
          <div class="placeholder-title">Complete Practice First</div>
          <p class="placeholder-detail">Finish all of Practice before unlocking Think Deeper.</p>
        </div>
        ${this.renderStageNav()}
      `;
    }
    const s = this.data.stage_3_think;
    const s3Stars = this.computeStage3Stars();

    return `
      <div class="stage-header">
        <h2 class="stage-title">${this.escapeHtml(s.title)}</h2>
        <p class="stage-description">${this.escapeHtml(s.description)} · <strong>⭐ ${s3Stars.earned} / ${s3Stars.total}</strong></p>
      </div>
      ${s.problems.map((p, i) => this.renderThinkProblem(p, i + 1)).join('')}
      ${this.renderStageNav()}
    `;
  },

  renderThinkProblem(p, num) {
    const sub = this.state.thinkSubmissions[p.id] || {};
    const isSubmitted = !!sub.submitted;
    const userAnswer = sub.value || '';
    const hasCriteria = p.self_check_criteria && p.self_check_criteria.length > 0;
    const starsEarned = isSubmitted && hasCriteria ? (sub.selfChecks || []).length : 0;
    const starsMax = hasCriteria ? p.self_check_criteria.length : 0;

    return `
      <div class="think-card ${isSubmitted ? 'submitted' : ''}" data-think-id="${this.escapeAttr(p.id)}">
        <div>
          <span class="question-number">${num}</span>
          ${p.category ? `<span class="question-category">${this.escapeHtml(p.category)}</span>` : ''}
          ${hasCriteria ? `<span class="marks-tag">⭐ ${starsEarned} / ${starsMax}</span>` : ''}
          ${isSubmitted ? `<span class="submitted-tag">✓ Submitted</span>` : ''}
        </div>
        ${p.scenario ? `<div class="scenario-box">${this.escapeHtml(p.scenario)}</div>` : ''}
        <p class="question-text">${this.escapeHtml(p.question)}</p>
        <textarea
          class="text-input"
          rows="5"
          placeholder="Write your answer here..."
          data-think-input="${this.escapeAttr(p.id)}"
          ${isSubmitted ? 'readonly' : ''}>${this.escapeHtml(userAnswer)}</textarea>
        <div class="question-actions">
          ${!isSubmitted
            ? `<button class="btn btn-success" data-think-submit="${this.escapeAttr(p.id)}">✓ Submit Answer</button>`
            : `<button class="btn btn-secondary" data-think-edit="${this.escapeAttr(p.id)}">✎ Edit Answer</button>`}
        </div>
        ${isSubmitted ? `
          <div class="model-answer-box">
            <span class="feedback-label">Model answer</span>
            <p class="answer-text">${this.escapeHtml(p.model_answer)}</p>
            ${p.explanation ? `
              <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--paper-dark);">
                <span class="feedback-label" style="color: var(--leaf);">Why this works</span>
                <p class="answer-text">${this.escapeHtml(p.explanation)}</p>
              </div>
            ` : ''}
          </div>
          ${hasCriteria ? `
            <div class="self-check-box">
              <div class="self-check-title">⭐ Self-Check — Rate Your Answer</div>
              ${p.self_check_criteria.map((c, ci) => {
                const checks = sub.selfChecks || [];
                const isChecked = checks.includes(ci);
                return `<div class="self-check-item" data-self-check="${this.escapeAttr(p.id)}" data-check-idx="${ci}">
                  <span class="self-check-tick ${isChecked ? 'checked' : ''}">${isChecked ? '✓' : ''}</span>
                  <span class="self-check-label">${this.escapeHtml(c)}</span>
                </div>`;
              }).join('')}
              <div class="self-check-stars">
                ⭐ ${starsEarned} / ${starsMax} checks passed
              </div>
            </div>
          ` : ''}
        ` : ''}
      </div>
    `;
  },

  countWords(s) {
    if (!s || !s.trim()) return 0;
    return s.trim().split(/\s+/).length;
  },

  wordCounterClass(count, limit) {
    if (!limit) return '';
    const m = limit.match(/(\d+)\s*[-–]\s*(\d+)/);
    if (!m) return '';
    const min = parseInt(m[1], 10), max = parseInt(m[2], 10);
    if (count >= min && count <= max) return 'in-range';
    if (count > max) return 'over';
    return '';
  },

  // ============================================================
  // STAGE 4: TEST
  // ============================================================
  renderStage4() {
    if (!this.isStageUnlocked(4)) {
      return `
        <div class="placeholder-card">
          <div class="placeholder-icon">🔒</div>
          <div class="placeholder-title">Complete Think Deeper First</div>
          <p class="placeholder-detail">Finish all five Think Deeper questions before taking the test.</p>
        </div>
        ${this.renderStageNav()}
      `;
    }
    if (this.state.testSubmitted) return this.renderResults();
    if (this.state.testStartTime === null) return this.renderTestIntro();
    return this.renderTestActive();
  },

  renderTestIntro() {
    const s = this.data.stage_4_test;
    const minutes = Math.floor((s.duration_seconds || 2400) / 60);
    const totalQuestions = s.sections.reduce((sum, sec) => sum + sec.questions.length, 0);

    return `
      <div class="test-intro">
        <div class="test-intro-icon">🏆</div>
        <h2>${this.escapeHtml(s.title)}</h2>
        <p class="test-intro-subtitle">${this.escapeHtml(s.subtitle || '')}</p>
        <div class="test-stats">
          <div class="test-stat">
            <div class="test-stat-num">${totalQuestions}</div>
            <div class="test-stat-label">Questions</div>
          </div>
          <div class="test-stat">
            <div class="test-stat-num">${s.total_marks}</div>
            <div class="test-stat-label">Marks</div>
          </div>
          <div class="test-stat">
            <div class="test-stat-num">${minutes}</div>
            <div class="test-stat-label">Minutes</div>
          </div>
        </div>
        <div class="test-sections-preview">
          ${s.sections.map(sec => `
            <div class="test-section-preview">
              <strong>${this.escapeHtml(sec.title)}</strong> · ${sec.marks} marks · ${sec.questions.length} questions
            </div>
          `).join('')}
        </div>
        <button class="test-start-btn" data-start-test="1">Start Test →</button>
      </div>
    `;
  },

  renderTestActive() {
    const s = this.data.stage_4_test;
    const elapsed = Math.floor((Date.now() - this.state.testStartTime) / 1000);
    const remaining = Math.max(0, (s.duration_seconds || 2400) - elapsed);
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    let timerClass = '';
    if (remaining < 60) timerClass = 'urgent';
    else if (remaining < 300) timerClass = 'warning';

    if (remaining === 0 && !this.state.testTimeUp) {
      this.state.testTimeUp = true;
      setTimeout(() => this.submitTest(), 100);
    }

    const totalQuestions = s.sections.reduce((sum, sec) => sum + sec.questions.length, 0);
    const answeredCount = Object.keys(this.state.testAnswers).filter(k => {
      const v = this.state.testAnswers[k];
      return v && v.value !== undefined && String(v.value).trim() !== '';
    }).length;

    return `
      <div class="timer-bar">
        <div class="timer-display ${timerClass}" id="timer-display">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div>
        <div class="timer-progress" id="timer-progress">${answeredCount} / ${totalQuestions} answered</div>
      </div>
      ${s.sections.map((sec, sidx) => this.renderTestSection(sec, sidx + 1)).join('')}
      <div class="test-submit-zone">
        <p style="margin-bottom: 12px; color: var(--ink-soft); font-size: 14px;">When you're done, submit your test.</p>
        <button class="btn btn-primary test-submit-btn" data-submit-test="1">Submit Test ✓</button>
      </div>
    `;
  },

  renderTestSection(section, sidx) {
    return `
      <div class="test-section">
        <div class="test-section-header">
          <h3>${this.escapeHtml(section.title)}</h3>
          <span class="test-section-marks">${section.marks} marks</span>
        </div>
        ${section.instructions ? `<p class="test-section-instructions">${this.escapeHtml(section.instructions)}</p>` : ''}
        ${section.passage ? this.renderTestPassage(section.passage) : ''}
        ${section.questions.map((q, i) => this.renderTestQuestion(q, sidx, i + 1)).join('')}
      </div>
    `;
  },

  renderTestPassage(passage) {
    return `
      <div class="test-passage">
        <div class="test-passage-title">${this.escapeHtml(passage.title)}</div>
        ${passage.author ? `<div class="test-passage-author">${this.escapeHtml(passage.author)}</div>` : ''}
        <div class="test-passage-text">${this.escapeHtml(passage.text)}</div>
        ${passage.is_ai_generated ? `<div class="test-passage-note">📝 ${this.escapeHtml(passage.review_note || 'AI-generated passage — parent please review.')}</div>` : ''}
      </div>
    `;
  },

  renderTestQuestion(q, sidx, qnum) {
    const ans = this.state.testAnswers[q.id] || {};
    const value = ans.value !== undefined ? String(ans.value) : '';

    let inputHtml = '';
    if (q.type === 'mcq') {
      inputHtml = `
        <ul class="options-list">
          ${q.options.map((opt, i) => {
            const letter = String.fromCharCode(65 + i);
            const selected = ans.value === letter;
            return `<li><button class="option-btn ${selected ? 'test-selected' : ''}" data-test-mcq="${this.escapeAttr(q.id)}" data-value="${this.escapeAttr(letter)}">
              <span class="option-letter">${letter}</span><span>${this.escapeHtml(opt)}</span>
            </button></li>`;
          }).join('')}
        </ul>
      `;
    } else if (q.type === 'fill_blank') {
      inputHtml = `<input type="text" class="text-input" data-test-input="${this.escapeAttr(q.id)}" value="${this.escapeAttr(value)}" placeholder="Type your answer...">`;
    } else if (q.type === 'short_answer' || q.type === 'subjective') {
      const wlimit = q.word_limit || '';
      const wc = this.countWords(value);
      const wccls = this.wordCounterClass(wc, wlimit);
      inputHtml = `
        ${wlimit ? `<div class="word-limit-tag">📝 Word limit: ${this.escapeHtml(wlimit)}</div>` : ''}
        <textarea class="text-input" rows="${q.type === 'subjective' ? 6 : 4}" data-test-input="${this.escapeAttr(q.id)}" placeholder="Write your answer here...">${this.escapeHtml(value)}</textarea>
        <div class="word-counter ${wccls}" data-counter-for="${this.escapeAttr(q.id)}">
          ${wc} word${wc === 1 ? '' : 's'}${wlimit ? ` · target: ${this.escapeHtml(wlimit)}` : ''}
        </div>
      `;
    }

    return `
      <div class="test-question">
        <div class="test-q-header">
          <span class="test-q-num">Q${qnum}</span>
          <span class="test-q-type">${q.type.replace('_', ' ').toUpperCase()}</span>
          <span class="marks-tag">${q.marks} mark${q.marks > 1 ? 's' : ''}</span>
        </div>
        <p class="question-text">${this.escapeHtml(q.question)}</p>
        ${inputHtml}
      </div>
    `;
  },

  startTest() {
    this.state.testStartTime = Date.now();
    this.state.testAnswers = {};
    this.state.testTimeUp = false;
    this.state.testSubmitted = false;
    this.startTimer();
    this.render();
    window.scrollTo(0, 0);
  },

  captureTestInputs() {
    document.querySelectorAll('[data-test-input]').forEach(el => {
      const qid = el.dataset.testInput;
      this.state.testAnswers[qid] = { ...(this.state.testAnswers[qid] || {}), value: el.value };
    });
  },

  submitTest() {
    this.captureTestInputs();
    this.stopTimer();
    this.state.testSubmitted = true;
    this.saveProgress();
    this.render();
    window.scrollTo(0, 0);
  },

  retakeTest() {
    if (!confirm('Retake the test? Your previous test answers will be cleared. (Other progress in Stages 1-3 stays.)')) return;
    this.state.testStartTime = null;
    this.state.testAnswers = {};
    this.state.testTimeUp = false;
    this.state.testSubmitted = false;
    this.saveProgress();
    this.render();
    window.scrollTo(0, 0);
  },

  // ============================================================
  // TIMER
  // ============================================================
  timerInterval: null,
  startTimer() {
    this.stopTimer();
    this.timerInterval = setInterval(() => {
      if (this.state.testSubmitted || this.state.testStartTime === null) {
        this.stopTimer();
        return;
      }
      const s = this.data.stage_4_test;
      const elapsed = Math.floor((Date.now() - this.state.testStartTime) / 1000);
      const remaining = Math.max(0, (s.duration_seconds || 2400) - elapsed);
      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;
      const display = document.getElementById('timer-display');
      if (display) {
        display.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        display.className = 'timer-display ' + (remaining < 60 ? 'urgent' : (remaining < 300 ? 'warning' : ''));
      }
      const progress = document.getElementById('timer-progress');
      if (progress) {
        const totalQuestions = s.sections.reduce((sum, sec) => sum + sec.questions.length, 0);
        // Capture current input values to keep "answered count" live without re-rendering
        document.querySelectorAll('[data-test-input]').forEach(el => {
          const qid = el.dataset.testInput;
          this.state.testAnswers[qid] = { ...(this.state.testAnswers[qid] || {}), value: el.value };
        });
        const answered = Object.keys(this.state.testAnswers).filter(k => {
