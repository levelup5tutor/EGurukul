<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-Gurukul · Learn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --saffron: #E87722; --marigold: #F4A82C; --cream: #FFF8EE; --paper: #FDF6E8;
  --paper-dark: #F5EBD3; --ink: #2B1810; --ink-soft: #5C4332; --leaf: #4A7C59;
  --leaf-light: #E8F4EA; --berry: #B8385E; --berry-light: #FBE9EE; --gold: #D4A53A;
  --sky: #5B8DB8; --sky-light: #E5F0F8; --shadow: rgba(43,24,16,0.12); --shadow-strong: rgba(43,24,16,0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--paper); color: var(--ink); font-family: 'Nunito', sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle at 20% 30%, rgba(232,119,34,0.04) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(244,168,44,0.06) 0%, transparent 50%); pointer-events: none; z-index: 0; }
.container { max-width: 920px; margin: 0 auto; padding: 24px 20px 80px; position: relative; z-index: 1; }
header.app-header { margin-bottom: 28px; padding: 24px 28px; background: linear-gradient(135deg, var(--saffron) 0%, var(--marigold) 100%); border-radius: 24px; color: white; box-shadow: 0 8px 24px var(--shadow); position: relative; overflow: hidden; }
header.app-header::before { content: ''; position: absolute; top: -50px; right: -50px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%); border-radius: 50%; }
.header-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.9; margin-bottom: 6px; }
.header-title { font-family: 'Fraunces', serif; font-weight: 900; font-size: clamp(26px, 5vw, 38px); line-height: 1.15; letter-spacing: -0.5px; }
.header-meta { margin-top: 10px; font-size: 14px; opacity: 0.95; font-weight: 600; }
.header-author { margin-top: 6px; font-size: 14px; opacity: 0.85; font-weight: 500; font-style: italic; }
.header-theme-pill { display: inline-block; margin-top: 12px; background: rgba(0,0,0,0.25); color: white; padding: 5px 14px; border-radius: 14px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; backdrop-filter: blur(4px); }
.reset-btn { position: absolute; top: 16px; right: 16px; background: var(--ink); color: white; border: 2px solid rgba(255,255,255,0.3); padding: 7px 14px; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.2s ease; z-index: 2; }
.reset-btn:hover { background: #1a0e07; border-color: white; transform: translateY(-1px); }
.progress-bar { display: flex; gap: 8px; margin-bottom: 32px; }
.progress-step { flex: 1; padding: 12px 8px; background: var(--paper-dark); border-radius: 12px; text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink-soft); cursor: pointer; transition: all 0.25s ease; border: 2px solid transparent; user-select: none; position: relative; }
.progress-step:hover { background: var(--cream); border-color: var(--marigold); }
.progress-step.active { background: var(--ink); color: var(--cream); }
.progress-step.complete { background: var(--leaf); color: white; }
.progress-step.locked { opacity: 0.5; cursor: not-allowed; }
.progress-step.locked:hover { background: var(--paper-dark); border-color: transparent; }
.progress-step.complete::after { content: '✓'; position: absolute; top: 4px; right: 6px; font-size: 11px; font-weight: 900; }
.progress-step.locked::after { content: '🔒'; position: absolute; top: 4px; right: 6px; font-size: 10px; }
.step-num { display: block; font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; }
.stage-header { margin-bottom: 24px; }
.stage-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: clamp(24px, 4vw, 32px); color: var(--ink); letter-spacing: -0.3px; margin-bottom: 6px; }
.stage-description { color: var(--ink-soft); font-size: 15px; }
.branches-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
.branch-card { background: var(--cream); border: 2px solid var(--paper-dark); border-radius: 18px; padding: 24px 20px; cursor: pointer; transition: all 0.25s ease; text-align: center; position: relative; }
.branch-card:hover { border-color: var(--marigold); transform: translateY(-3px); box-shadow: 0 6px 16px var(--shadow); }
.branch-card.complete { border-color: var(--leaf); background: var(--leaf-light); }

/* ===== Stage 0: Deep Dive ===== */
.dd-banner { display: flex; gap: 16px; align-items: center; background: linear-gradient(135deg, var(--sky) 0%, #7BA7CC 100%); color: white; border-radius: 18px; padding: 18px 22px; margin-bottom: 18px; cursor: pointer; box-shadow: 0 4px 14px var(--shadow); transition: all 0.2s ease; border: 2px solid transparent; }
.dd-banner:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--shadow-strong); }
.dd-banner.open { border-color: var(--marigold); }
.dd-banner-icon { font-size: 34px; }
.dd-banner-title { font-family: 'Fraunces', serif; font-weight: 900; font-size: 20px; }
.dd-banner-sub { font-size: 13px; opacity: 0.95; }
.dd-topic-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 12px; }
.badge-name, .badge-tagline { display: none; }
.dd-topic-sub { font-size: 13px; color: var(--ink-soft); margin-top: 6px; }
.dd-section { background: var(--cream); border: 2px solid var(--paper-dark); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
.dd-section h3 { font-family: 'Fraunces', serif; font-size: 20px; margin-bottom: 14px; color: var(--ink); }
.dd-story p { margin-bottom: 14px; }
.dd-figure { background: white; border: 2px solid var(--paper-dark); border-radius: 14px; padding: 12px; margin: 18px 0 6px; }
.dd-figure svg { width: 100%; height: auto; display: block; border-radius: 8px; }
.dd-caption { font-size: 13px; color: var(--ink-soft); font-style: italic; text-align: center; margin-top: 8px; }
.dd-step { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 14px; }
.dd-step-num { flex: 0 0 34px; height: 34px; border-radius: 50%; background: var(--saffron); color: white; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.dd-step-body { flex: 1; }
.dd-step-title { font-weight: 800; margin-bottom: 2px; }
.dd-step-example { background: var(--sky-light); border-left: 4px solid var(--sky); border-radius: 0 10px 10px 0; padding: 8px 12px; margin-top: 8px; font-size: 14px; }
.dd-callout { border-radius: 18px; padding: 20px 24px; margin-bottom: 20px; border: 2px solid; }
.dd-callout.tip { background: #FFF3DC; border-color: var(--marigold); }
.dd-callout.funfact { background: var(--sky-light); border-color: var(--sky); }
.dd-callout h3 { font-family: 'Fraunces', serif; font-size: 18px; margin-bottom: 8px; }

.branch-card.complete::after { content: '✓'; position: absolute; top: 12px; right: 16px; width: 24px; height: 24px; background: var(--leaf); color: white; border-radius: 50%; line-height: 24px; font-weight: 900; font-size: 14px; }
.branch-icon { font-size: 40px; margin-bottom: 12px; }
.branch-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; color: var(--ink); margin-bottom: 4px; }
.branch-meta { font-size: 12px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.branch-meta.stars-meta { color: var(--saffron); letter-spacing: 0.5px; text-transform: none; font-size: 13px; }
.branch-progress { margin-top: 12px; font-size: 13px; color: var(--ink-soft); }
.panel-container { background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 16px var(--shadow); margin-bottom: 20px; }
.panel-dots { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.panel-dot { background: var(--paper-dark); color: var(--ink-soft); border: 2px solid transparent; padding: 8px 14px; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s ease; min-width: 44px; }
.panel-dot:hover { border-color: var(--marigold); }
.panel-dot.current { background: var(--ink); color: var(--cream); }
.panel-dot.answered { background: var(--leaf); color: white; }
.panel-dot.current.answered { background: var(--ink); border-color: var(--leaf); border-width: 3px; }
.panel-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--paper-dark); }
.panel-counter { font-size: 12px; font-weight: 800; color: var(--saffron); letter-spacing: 1.5px; text-transform: uppercase; }
.panel-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; color: var(--ink); margin-bottom: 16px; }
.narration-text { font-size: 16px; line-height: 1.75; color: var(--ink); margin-bottom: 16px; }
.narration-text .highlight-word { background: linear-gradient(180deg, transparent 60%, rgba(244,168,44,0.4) 60%); cursor: pointer; font-weight: 700; color: var(--ink); border-radius: 2px; transition: background 0.2s ease; position: relative; }
.narration-text .highlight-word:hover { background: linear-gradient(180deg, transparent 30%, rgba(244,168,44,0.7) 30%); }
.word-tooltip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--cream); padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; line-height: 1.4; width: max-content; max-width: 240px; text-align: center; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,0.25); pointer-events: none; }
.word-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: var(--ink); }
.tts-controls { display: flex; gap: 10px; align-items: center; background: var(--sky-light); border-radius: 12px; padding: 10px 14px; margin-bottom: 16px; flex-wrap: wrap; }
.tts-btn { background: var(--sky); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px; }
.tts-btn:hover { background: #4a7a9c; }
.tts-btn.playing { background: var(--berry); animation: pulse 1.5s ease-in-out infinite; }
.tts-status { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.comprehension-check { background: var(--cream); border: 2px solid var(--marigold); border-radius: 16px; padding: 20px; margin-top: 16px; }
.check-label { display: inline-block; background: var(--saffron); color: white; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.check-question { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; line-height: 1.4; margin-bottom: 14px; color: var(--ink); }
.options-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.option-btn { background: white; border: 2px solid var(--paper-dark); padding: 12px 16px; border-radius: 12px; text-align: left; cursor: pointer; font-family: inherit; font-size: 14px; color: var(--ink); transition: all 0.2s ease; width: 100%; display: flex; align-items: center; gap: 10px; }
.option-btn:hover:not(:disabled) { border-color: var(--marigold); background: var(--paper); transform: translateX(2px); }
.option-letter { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; background: var(--paper-dark); border-radius: 8px; font-weight: 700; font-size: 12px; flex-shrink: 0; color: var(--ink-soft); }
.option-btn.correct { background: var(--leaf-light); border-color: var(--leaf); color: var(--leaf); font-weight: 700; }
.option-btn.correct .option-letter { background: var(--leaf); color: white; }
.option-btn.incorrect { background: var(--berry-light); border-color: var(--berry); color: var(--berry); }
.option-btn.incorrect .option-letter { background: var(--berry); color: white; }
.option-btn:disabled { cursor: default; }
.feedback-box { margin-top: 12px; padding: 14px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; animation: slideDown 0.3s ease; }
.feedback-box.hint { background: #FFF4D6; border-left: 4px solid var(--gold); color: var(--ink); }
.feedback-box.explanation { background: var(--leaf-light); border-left: 4px solid var(--leaf); color: var(--ink); }
.feedback-label { font-weight: 800; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; margin-bottom: 4px; display: block; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.panel-nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
.vocab-group-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.vocab-group-tab { background: var(--paper-dark); color: var(--ink-soft); border: 2px solid transparent; padding: 10px 18px; border-radius: 12px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s ease; }
.vocab-group-tab:hover { border-color: var(--marigold); }
.vocab-group-tab.active { background: var(--saffron); color: white; }
.vocab-group-tab.complete:not(.active) { background: var(--leaf-light); color: var(--leaf); border-color: var(--leaf); }
.vocab-card { height: 280px; cursor: pointer; perspective: 1000px; }
.vocab-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(0.4, 0.0, 0.2, 1); transform-style: preserve-3d; }
.vocab-card.flipped .vocab-card-inner { transform: rotateY(180deg); }
.vocab-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 18px; padding: 22px; display: flex; flex-direction: column; box-shadow: 0 4px 16px var(--shadow); overflow: hidden; }
.vocab-face.front { background: var(--cream); border: 2px solid var(--paper-dark); align-items: center; justify-content: center; text-align: center; }
.vocab-face.back { background: linear-gradient(135deg, var(--saffron), var(--marigold)); color: white; transform: rotateY(180deg); overflow-y: auto; text-align: left; }
.vocab-card.complete .vocab-face.front { border-color: var(--leaf); background: var(--leaf-light); }
.vocab-card.complete .vocab-face.front::after { content: '✓'; position: absolute; top: 12px; right: 16px; width: 24px; height: 24px; background: var(--leaf); color: white; border-radius: 50%; line-height: 24px; font-weight: 900; font-size: 14px; }
.vocab-word { font-family: 'Fraunces', serif; font-weight: 700; font-size: 30px; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.5px; }
.vocab-source-tag { display: inline-block; background: var(--paper-dark); color: var(--ink-soft); padding: 2px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.vocab-flip-hint { margin-top: 12px; font-size: 11px; color: var(--ink-soft); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; opacity: 0.6; }
.vocab-meaning { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 500; line-height: 1.4; margin-bottom: 10px; }
.vocab-example { font-size: 12px; line-height: 1.45; margin-bottom: 6px; opacity: 0.95; }
.vocab-example-label { font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.85; margin-bottom: 2px; display: block; }
.spot-it-cta { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 10px; text-align: center; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid rgba(255,255,255,0.4); }
.spot-it-cta:hover { background: rgba(255,255,255,0.3); }
.modal-overlay { position: fixed; inset: 0; background: rgba(43,24,16,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-content { background: var(--cream); border-radius: 20px; padding: 28px; max-width: 480px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.modal-word { color: var(--saffron); font-style: italic; }
.question-card { background: var(--cream); border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--paper-dark); }
.question-number { display: inline-block; background: var(--ink); color: var(--cream); font-family: 'Fraunces', serif; font-weight: 700; width: 36px; height: 36px; line-height: 36px; text-align: center; border-radius: 50%; font-size: 16px; margin-bottom: 12px; }
.passage-excerpt { background: var(--paper); padding: 12px 16px; border-radius: 12px; border-left: 4px solid var(--sky); margin-bottom: 12px; font-style: italic; color: var(--ink-soft); font-size: 13px; line-height: 1.5; }
.question-text { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; line-height: 1.4; margin-bottom: 14px; color: var(--ink); }
.question-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.btn { padding: 10px 18px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 14px; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--paper-dark); color: var(--ink); }
.btn-secondary:hover:not(:disabled) { background: var(--marigold); color: white; }
.btn-primary { background: var(--saffron); color: white; box-shadow: 0 4px 12px rgba(232,119,34,0.3); }
.btn-primary:hover:not(:disabled) { background: var(--ink); transform: translateY(-2px); }
.btn-success { background: var(--leaf); color: white; box-shadow: 0 4px 12px rgba(74,124,89,0.3); }
.btn-success:hover:not(:disabled) { background: #3a6248; transform: translateY(-2px); }
.stage-nav { margin-top: 32px; display: flex; justify-content: space-between; gap: 12px; }
.placeholder-card { background: var(--cream); border: 2px dashed var(--paper-dark); border-radius: 20px; padding: 48px 32px; text-align: center; color: var(--ink-soft); }
.placeholder-icon { font-size: 60px; margin-bottom: 16px; opacity: 0.5; }
.placeholder-title { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); margin-bottom: 8px; }
.placeholder-detail { font-size: 14px; line-height: 1.6; max-width: 480px; margin: 0 auto; }
.loading-screen, .error-screen { text-align: center; padding: 48px 20px; }
.spinner { width: 48px; height: 48px; border: 4px solid var(--paper-dark); border-top-color: var(--saffron); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-screen { background: var(--berry-light); border: 2px solid var(--berry); color: var(--berry); border-radius: 16px; }
/* === STAGE 3: THINK DEEPER === */
.think-card { background: var(--cream); border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 16px var(--shadow); border: 2px solid var(--paper-dark); transition: border-color 0.3s ease; }
.think-card.submitted { border-color: var(--leaf); background: linear-gradient(135deg, var(--cream), var(--leaf-light)); }
.scenario-box { background: var(--paper); padding: 14px 16px; border-radius: 12px; border-left: 4px solid var(--marigold); margin: 12px 0 14px 0; font-style: italic; color: var(--ink-soft); font-size: 14px; line-height: 1.6; }
.word-limit-tag { display: inline-block; background: var(--sky); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 8px; }
.text-input { width: 100%; padding: 14px 16px; border: 2px solid var(--paper-dark); border-radius: 12px; font-family: inherit; font-size: 15px; background: white; color: var(--ink); transition: border-color 0.2s ease; line-height: 1.5; }
.text-input:focus { outline: none; border-color: var(--saffron); }
textarea.text-input { resize: vertical; min-height: 100px; }
textarea.text-input[readonly] { background: var(--paper); cursor: default; }
.word-counter { margin-top: 6px; font-size: 12px; font-weight: 700; color: var(--ink-soft); text-align: right; transition: color 0.2s ease; }
.word-counter.in-range { color: var(--leaf); }
.word-counter.over { color: var(--berry); }
.model-answer-box { margin-top: 14px; padding: 16px 18px; background: linear-gradient(135deg, var(--cream), var(--paper-dark)); border-radius: 12px; border: 2px dashed var(--marigold); animation: slideDown 0.4s ease; }
.model-answer-box .feedback-label { color: var(--saffron); }
.model-answer-accordion { margin-top: 14px; background: var(--paper); border-radius: 12px; border: 1px solid var(--paper-dark); overflow: hidden; }
.stars-info-card { margin-top: 24px; background: var(--cream); border-radius: 14px; border: 1px solid var(--paper-dark); overflow: hidden; }
.stars-info-card summary { padding: 14px 18px; cursor: pointer; font-family: 'Fraunces', serif; font-weight: 700; font-size: 15px; color: var(--ink); background: var(--cream); transition: background 0.2s ease; user-select: none; list-style: none; position: relative; }
.stars-info-card summary::-webkit-details-marker { display: none; }
.stars-info-card summary::after { content: '▼'; position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--ink-soft); transition: transform 0.2s ease; }
.stars-info-card[open] summary::after { transform: translateY(-50%) rotate(180deg); }
.stars-info-card summary:hover { background: var(--paper-dark); }
.stars-info-card[open] summary { background: var(--paper-dark); border-bottom: 1px solid var(--paper-dark); }
.stars-info-body { padding: 16px 20px; font-size: 13px; line-height: 1.6; color: var(--ink); }

            "content": "Riya was humming the poem 'Friends' on the school bus when her friend Sana laughed. \"Why are you SINGING your English homework?\"\n\n\"Because it sounds like a song!\" said Riya. \"Listen — *going... askew... showing... you*. The ends of the lines keep matching!\"\n\nSana listened again. Riya was right. Line 1 rhymed with line 3, and line 2 rhymed with line 4 — like a see-saw of sounds. \"That matching pattern has a name,\" said Riya. \"Ma'am calls it a **rhyme scheme**. We mark matching sounds with the same letter — so this poem is **ABAB**.\"\n\n\"And notice something else,\" Riya added. \"The poet says *ain't* and *greetin'* — like he's chatting at your doorstep, not giving a speech! That friendly, casual style is his **tone**. A poem about friends SHOULD sound like a friend talking, no?\"\n\nSana grinned. \"So the poem's sound and the poem's meaning are holding hands — like friends.\"",
            "image_svg": "<svg viewBox=\"0 0 800 500\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Verdana,sans-serif\"><rect width=\"800\" height=\"500\" fill=\"#FDF6EC\"/><rect x=\"40\" y=\"30\" width=\"720\" height=\"70\" rx=\"12\" fill=\"#7C5CBF\"/><text x=\"400\" y=\"62\" font-size=\"24\" font-weight=\"bold\" fill=\"#FFFFFF\" text-anchor=\"middle\">A Poem is Music Made of Words</text><text x=\"400\" y=\"88\" font-size=\"14\" fill=\"#EDE4FF\" text-anchor=\"middle\">Rhyme scheme of Stanza 1 — the ABAB pattern</text><g font-size=\"17\"><rect x=\"70\" y=\"130\" width=\"520\" height=\"46\" rx=\"10\" fill=\"#FFFFFF\" stroke=\"#D8CBB6\"/><text x=\"90\" y=\"159\" fill=\"#3B3B3B\">Ain't it fine when things are <tspan font-weight=\"bold\" fill=\"#E87722\">going</tspan></text><circle cx=\"640\" cy=\"153\" r=\"18\" fill=\"#E87722\"/><text x=\"640\" y=\"160\" font-size=\"17\" font-weight=\"bold\" fill=\"#FFF\" text-anchor=\"middle\">A</text><rect x=\"70\" y=\"190\" width=\"520\" height=\"46\" rx=\"10\" fill=\"#FFFFFF\" stroke=\"#D8CBB6\"/><text x=\"90\" y=\"219\" fill=\"#3B3B3B\">Topsy-turvy and <tspan font-weight=\"bold\" fill=\"#2E86AB\">askew</tspan></text><circle cx=\"640\" cy=\"213\" r=\"18\" fill=\"#2E86AB\"/><text x=\"640\" y=\"220\" font-size=\"17\" font-weight=\"bold\" fill=\"#FFF\" text-anchor=\"middle\">B</text><rect x=\"70\" y=\"250\" width=\"520\" height=\"46\" rx=\"10\" fill=\"#FFFFFF\" stroke=\"#D8CBB6\"/><text x=\"90\" y=\"279\" fill=\"#3B3B3B\">To discover someone <tspan font-weight=\"bold\" fill=\"#E87722\">showing</tspan></text><circle cx=\"640\" cy=\"273\" r=\"18\" fill=\"#E87722\"/><text x=\"640\" y=\"280\" font-size=\"17\" font-weight=\"bold\" fill=\"#FFF\" text-anchor=\"middle\">A</text><rect x=\"70\" y=\"310\" width=\"520\" height=\"46\" rx=\"10\" fill=\"#FFFFFF\" stroke=\"#D8CBB6\"/><text x=\"90\" y=\"339\" fill=\"#3B3B3B\">Good old-fashioned faith in <tspan font-weight=\"bold\" fill=\"#2E86AB\">you</tspan>?</text><circle cx=\"640\" cy=\"333\" r=\"18\" fill=\"#2E86AB\"/><text x=\"640\" y=\"340\" font-size=\"17\" font-weight=\"bold\" fill=\"#FFF\" text-anchor=\"middle\">B</text></g><path d=\"M622 153 C 700 163, 700 263, 622 273\" stroke=\"#E87722\" stroke-width=\"3\" fill=\"none\" stroke-dasharray=\"6 5\"/><path d=\"M622 213 C 715 223, 715 323, 622 333\" stroke=\"#2E86AB\" stroke-width=\"3\" fill=\"none\" stroke-dasharray=\"6 5\"/><rect x=\"70\" y=\"390\" width=\"660\" height=\"80\" rx=\"12\" fill=\"#EFE3FB\" stroke=\"#7C5CBF\"/><text x=\"90\" y=\"422\" font-size=\"16\" font-weight=\"bold\" fill=\"#4A2E85\">Same-colour circles = rhyming line-ends.</text><text x=\"90\" y=\"450\" font-size=\"15\" fill=\"#4A2E85\">going–showing rhyme (A) · askew–you rhyme (B) → pattern: A B A B</text></svg>",
            "image_caption": "Stanza 1 of 'Friends' — same-colour circles show which line-ends rhyme, giving the pattern ABAB."

          {
            "type": "steps",
            "title": "How to Find Any Poem's Rhyme Scheme",
            "steps": [
              {
                "title": "Read the stanza aloud",
                "text": "Rhyme lives in SOUND, not spelling. Read the last word of every line out loud.",
                "example": "going / askew / showing / you — say them, don't just look at them ('askew' and 'you' rhyme even though they look different!)."
              },
              {
                "title": "Give the first line-end the letter A",
                "text": "The last word of line 1 is always A. That's your starting sound.",
                "example": "'going' → A."
              },
              {
                "title": "Match or move on",
                "text": "For each next line: if its last word rhymes with an earlier sound, give it that SAME letter. If it's a new sound, give it the next letter.",
                "example": "'askew' — new sound → B. 'showing' — rhymes with 'going' → A again. 'you' — rhymes with 'askew' → B."
              },
              {
                "title": "Read out the pattern",
                "text": "String the letters together — that's the rhyme scheme. Check the other stanzas the same way.",
                "example": "A-B-A-B. Every stanza of 'Friends' follows this same musical see-saw."
              }
            ]
          },
          {
            "type": "tip",
            "title": "Remember It Like This",
            "content": "A rhyme scheme is like a **floor-tile pattern** 🔷 — the same design repeating in a fixed order. Once you spot the repeat (ABAB), you can predict the whole floor! And tone? Just ask: *if this poem were a person, HOW would it be talking to me — angrily, sadly, or like a cheerful friend?* 'Friends' talks like a cheerful friend."

        "sections": [
          {
            "type": "story",
            "title": "Arjun Sorts His Whole House",
            "content": "One Sunday, Arjun's grandfather gave him a strange challenge: \"Everything in this house — and everything you FEEL in this house — is a noun. Sort them into kinds, and I'll buy you ice cream.\"\n\nArjun started easy. *Sofa, television, cake* — he could see and touch them all. \"**Concrete nouns**!\" he announced.\n\nOn the wall hung a photo of Grandfather receiving a cricket trophy from Mr Mehta. \"'Mr Mehta' is a special name — a **proper noun**. And *player* — that's anyone who plays — a **common noun**.\"\n\nThen he heard the pigeons. Not one pigeon — a whole **flock** landing on the terrace. \"A group acting like ONE unit — **collective noun**!\"\n\nAt last Grandfather asked, \"And what do you feel when I tell you my cricket stories?\" Arjun thought hard. \"Happiness... and pride. But I can't touch happiness or keep pride in my pocket!\"\n\nGrandfather smiled. \"Exactly. Feelings, qualities, ideas — the invisible family members — are **abstract nouns**. Now, ice cream? That one is very, very concrete.\"",
            "image_svg": "<svg viewBox=\"0 0 800 500\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Verdana,sans-serif\"><rect width=\"800\" height=\"500\" fill=\"#F2F8F2\"/><rect x=\"270\" y=\"24\" width=\"260\" height=\"56\" rx=\"14\" fill=\"#2E7D32\"/><text x=\"400\" y=\"58\" font-size=\"22\" font-weight=\"bold\" fill=\"#FFF\" text-anchor=\"middle\">NOUN</text><g stroke=\"#7A9B7A\" stroke-width=\"3\"><line x1=\"400\" y1=\"80\" x2=\"120\" y2=\"150\"/><line x1=\"400\" y1=\"80\" x2=\"307\" y2=\"150\"/><line x1=\"400\" y1=\"80\" x2=\"493\" y2=\"150\"/><line x1=\"400\" y1=\"80\" x2=\"680\" y2=\"150\"/><line x1=\"400\" y1=\"80\" x2=\"400\" y2=\"150\"/></g><g text-anchor=\"middle\"><rect x=\"40\" y=\"150\" width=\"160\" height=\"60\" rx=\"12\" fill=\"#E87722\"/><text x=\"120\" y=\"176\" font-size=\"15\" font-weight=\"bold\" fill=\"#FFF\">PROPER</text><text x=\"120\" y=\"196\" font-size=\"12\" fill=\"#FFF\">specific name + Capital</text><rect x=\"227\" y=\"150\" width=\"160\" height=\"60\" rx=\"12\" fill=\"#2E86AB\"/><text x=\"307\" y=\"176\" font-size=\"15\" font-weight=\"bold\" fill=\"#FFF\">COMMON</text><text x=\"307\" y=\"196\" font-size=\"12\" fill=\"#FFF\">general name</text><rect x=\"413\" y=\"150\" width=\"160\" height=\"60\" rx=\"12\" fill=\"#7C5CBF\"/><text x=\"493\" y=\"176\" font-size=\"15\" font-weight=\"bold\" fill=\"#FFF\">COLLECTIVE</text><text x=\"493\" y=\"196\" font-size=\"12\" fill=\"#FFF\">group = one unit</text><rect x=\"600\" y=\"150\" width=\"160\" height=\"60\" rx=\"12\" fill=\"#C2185B\"/><text x=\"680\" y=\"176\" font-size=\"15\" font-weight=\"bold\" fill=\"#FFF\">CONCRETE</text><text x=\"680\" y=\"196\" font-size=\"12\" fill=\"#FFF\">5 senses can catch it</text><rect x=\"320\" y=\"240\" width=\"160\" height=\"60\" rx=\"12\" fill=\"#00838F\"/><text x=\"400\" y=\"266\" font-size=\"15\" font-weight=\"bold\" fill=\"#FFF\">ABSTRACT</text><text x=\"400\" y=\"286\" font-size=\"12\" fill=\"#FFF\">feeling / quality / idea</text></g><g font-size=\"14\" text-anchor=\"middle\"><text x=\"120\" y=\"236\" fill=\"#B45309\" font-weight=\"bold\">Mumbai · Dhoni · India</text><text x=\"307\" y=\"236\" fill=\"#1D6389\" font-weight=\"bold\">boy · tree · toy</text><text x=\"493\" y=\"236\" fill=\"#5B3FA0\" font-weight=\"bold\">team · herd · pile</text><text x=\"680\" y=\"236\" fill=\"#9C1550\" font-weight=\"bold\">salt · music · ice</text><text x=\"400\" y=\"326\" fill=\"#00636E\" font-weight=\"bold\">honesty · courage · friendship</text></g><rect x=\"60\" y=\"360\" width=\"680\" height=\"110\" rx=\"14\" fill=\"#FFFFFF\" stroke=\"#2E7D32\" stroke-width=\"2\"/><text x=\"80\" y=\"392\" font-size=\"16\" font-weight=\"bold\" fill=\"#2E7D32\">One sentence, four kinds:</text><text x=\"80\" y=\"420\" font-size=\"15\" fill=\"#333\">A <tspan font-weight=\"bold\" fill=\"#7C5CBF\">team</tspan> from <tspan font-weight=\"bold\" fill=\"#E87722\">Mumbai</tspan> won the <tspan font-weight=\"bold\" fill=\"#C2185B\">trophy</tspan> with pure <tspan font-weight=\"bold\" fill=\"#00838F\">determination</tspan>.</text><text x=\"80\" y=\"450\" font-size=\"13\" fill=\"#666\">collective · proper · concrete · abstract — can you spot why each label fits?</text></svg>",
            "image_caption": "The Noun Family Tree — five kinds, with examples straight from your Grammar Guide."
          },
          {
            "type": "steps",
            "title": "The 3-Question Noun Test (works on ANY noun)",
            "steps": [
              {
                "title": "Q1: Is it a special name with a capital letter?",
                "text": "If the noun names ONE specific person, place, animal, thing or festival — it's a PROPER noun. Test over!",
                "example": "Dhoni, Bengaluru, Mumbai, India → proper. 'boy', 'city' → not special names, go to Q2."
              },
              {
                "title": "Q2: Is it a group acting as one unit?",
                "text": "If one word packs a whole group inside it — it's a COLLECTIVE noun.",
                "example": "team (many players), herd (many cows), pile (many books), bouquet (many flowers)."
              },
              {
                "title": "Q3: Can your five senses catch it?",
                "text": "If you can see, hear, smell, taste or touch it — CONCRETE. If it's a feeling, quality or idea that has no body — ABSTRACT.",
                "example": "music → you HEAR it → concrete. honesty → no sense organ can catch it → abstract."
              },
              {
                "title": "Everything left over is common",
                "text": "A general name that failed Q1 and Q2 but is still a person/place/animal/thing — that's your everyday COMMON noun.",
                "example": "boy, tree, toy, school, cat — the biggest, busiest branch of the family."
              }
            ]
          },
          {
            "type": "tip",
            "title": "Remember It Like This",
            "content": "The exam's favourite trap is **abstract vs concrete**. Use the **pocket test** 👖: *Can I put it (or a recording/photo of it) in my pocket?* A smile — you can photograph it → concrete. Happiness — no photo can capture happiness itself, only the smile it causes → abstract. That's exactly the 'Sanvi's happiness / bright smile' question!"
          },

          }

        "id": "dd_detective_reading",
        "title": "Detective Reading",

        "subtitle": "How to crack an unseen passage you've never read before",
        "sections": [
          {
            "type": "story",
            "title": "The Case of the Frozen Screen",
            "content": "Ananya opened her worksheet and groaned. A full-page passage she had **never seen before**, with questions like *'What does this phrase imply?'* Her stomach did a somersault.\n\nHer elder brother Kabir, studying for his boards, looked over. \"You're reading it like a storybook. Read it like a **detective**.\"\n\n\"A detective?\"\n\n\"A detective never answers before collecting clues. Read the passage once fully — just to know WHAT happened. Then read the QUESTION, and go back hunting for the exact lines that hide the answer. **Underline them.** The examiner always leaves clues; your job is to find which paragraph they're buried in.\"\n\nAnanya tried it. *Why did the family sit silent and hesitant?* She hunted... Para 2: the screen froze, no signal, and nobody knew the way. She underlined it, then wrote the answer **in her own words**.\n\n\"One more secret,\" said Kabir. \"When the question says *implies* or *suggests*, the answer is NOT sitting in the passage wearing a name tag. You must connect clues — that's the detective's real skill.\"\n\nAnanya smiled at the next question. The passage was no longer a mystery. It was a crime scene, and she had the magnifying glass.",
            "image_svg": "<svg viewBox=\"0 0 800 500\" xmlns=\"http://www.w3.org/2000/svg\" font-family=\"Verdana,sans-serif\"><rect width=\"800\" height=\"500\" fill=\"#EDF3F8\"/><rect x=\"50\" y=\"30\" width=\"440\" height=\"440\" rx=\"10\" fill=\"#FFFFFF\" stroke=\"#B9C8D4\" stroke-width=\"2\"/><text x=\"270\" y=\"68\" font-size=\"17\" font-weight=\"bold\" fill=\"#1F4E79\" text-anchor=\"middle\">The Unseen Passage</text><g stroke=\"#C9D6E0\" stroke-width=\"8\" stroke-linecap=\"round\"><line x1=\"80\" y1=\"100\" x2=\"460\" y2=\"100\"/><line x1=\"80\" y1=\"128\" x2=\"440\" y2=\"128\"/><line x1=\"80\" y1=\"156\" x2=\"455\" y2=\"156\"/><line x1=\"80\" y1=\"204\" x2=\"450\" y2=\"204\"/><line x1=\"80\" y1=\"232\" x2=\"430\" y2=\"232\"/><line x1=\"80\" y1=\"280\" x2=\"455\" y2=\"280\"/><line x1=\"80\" y1=\"308\" x2=\"420\" y2=\"308\"/><line x1=\"80\" y1=\"356\" x2=\"445\" y2=\"356\"/><line x1=\"80\" y1=\"384\" x2=\"435\" y2=\"384\"/></g><g stroke=\"#E87722\" stroke-width=\"4\" stroke-linecap=\"round\"><line x1=\"120\" y1=\"138\" x2=\"240\" y2=\"138\"/><line x1=\"300\" y1=\"242\" x2=\"400\" y2=\"242\"/><line x1=\"150\" y1=\"318\" x2=\"280\" y2=\"318\"/></g><circle cx=\"580\" cy=\"200\" r=\"90\" fill=\"none\" stroke=\"#1F4E79\" stroke-width=\"12\"/><circle cx=\"580\" cy=\"200\" r=\"78\" fill=\"#DCEFFB\" opacity=\"0.85\"/><line x1=\"645\" y1=\"265\" x2=\"730\" y2=\"350\" stroke=\"#1F4E79\" stroke-width=\"18\" stroke-linecap=\"round\"/><text x=\"580\" y=\"185\" font-size=\"15\" font-weight=\"bold\" fill=\"#1F4E79\" text-anchor=\"middle\">WHY did she</text><text x=\"580\" y=\"207\" font-size=\"15\" font-weight=\"bold\" fill=\"#1F4E79\" text-anchor=\"middle\">hesitate?</text><text x=\"580\" y=\"232\" font-size=\"13\" fill=\"#2E5C8A\" text-anchor=\"middle\">clue is in Para 2!</text><g text-anchor=\"middle\" font-size=\"13\" font-weight=\"bold\"><rect x=\"530\" y=\"330\" width=\"230\" height=\"44\" rx=\"10\" fill=\"#2E7D32\"/><text x=\"645\" y=\"349\" fill=\"#FFF\">Underline clue lines FIRST</text><text x=\"645\" y=\"366\" fill=\"#D9F2DA\">then answer in your words</text><rect x=\"530\" y=\"390\" width=\"230\" height=\"44\" rx=\"10\" fill=\"#E87722\"/><text x=\"645\" y=\"409\" fill=\"#FFF\">Question asks WHY / IMPLIES?</text><text x=\"645\" y=\"426\" fill=\"#FDEBD0\">→ answer is hidden, not copied</text></g><text x=\"270\" y=\"446\" font-size=\"13\" fill=\"#888\" text-anchor=\"middle\">Orange underlines = detective marks on clue sentences</text></svg>",
            "image_caption": "Detective Reading — underline the clue lines first, then answer 'why/implies' questions in your own words."
          },
          {
            "type": "steps",
            "title": "The 5-Step Unseen Passage Method (use this in PT2!)",
            "steps": [
              {
                "title": "Read the FULL passage once — no pen",
                "text": "First pass is only to understand the story: who, what happened, how it ended. Don't worry about hard words yet.",
                "example": "In 'When the Maps Went Silent': family drives, app freezes, farmer helps, Arjun learns something."
              },
              {
                "title": "Read each question, then HUNT for its clue lines",
                "text": "Go back to the passage with the question in your head. Underline the sentence(s) that hide the answer. Para numbers are your map.",
                "example": "'Why hesitant?' → hunt Para 2 → underline 'screen froze... no signal... unsure of what to do'."
              },
              {
                "title": "For 'find a word that means...' — match the MEANING, not the look",
                "text": "Read the given meaning, then scan ONLY the mentioned paragraph for a word that fits it. Try swapping your word into the meaning to check.",
                "example": "'unsure or slow to act' (Para 2) → scan → 'hesitant'. Swap-test: 'everyone sat silent and unsure' ✓."
              },
              {
                "title": "For 'implies / suggests / symbolises' — connect two clues",
                "text": "These answers are hidden between the lines. Ask: what do these clues ADD UP to? Eliminate options that only repeat one surface detail.",
                "example": "'People are like living maps' + farmer's landmark directions → people carry way-knowledge like maps do."
              },
              {
                "title": "For opinion questions — use the O-P-O formula",
                "text": "Opinion (state yours clearly) + Passage evidence (one idea from the text) + Own example. Then count your words against the limit.",
                "example": "'Should we depend fully on gadgets?' → No (O) + family froze with the app (P) + my calculator made my mental maths slow (O)."
              }
            ]
          },
          {
            "type": "tip",
            "title": "Remember It Like This",
            "content": "**Read twice, write once** — like a tailor who measures twice and cuts once ✂️. First read = understand. Second read = underline clues. Only THEN write. Rushing to write after one read is how detectives arrest the wrong option!"
          },
          {
            "type": "funfact",
            "title": "Did You Know?",
            "content": "Examiners deliberately build MCQ options from words **copied straight from the passage** to tempt fast readers — while the correct option often uses different words with the same meaning. So an option 'looking familiar' proves nothing. Detectives check meaning, not familiar faces!"
          }
        ]
      }

  "stage_1_learn": {
    "title": "Learn",
    "description": "Read the poem, master the grammar kinds, and learn the words.",
    "branches": [
      {
        "id": "branch_lit",
        "title": "The Poem",
        "icon": "📖",
        "type": "story_panels",
        "marks": 5,
        "source_book": "Burlington Coursebook",
        "story_title": "Friends",
        "story_author": "Edgar A Guest",
        "panels": [
          {
            "id": "panel_1",
            "panel_title": "Stanza 1 — Faith in Hard Times",
            "narration_text": "<div style=\"background:#FFF8EE;border-left:5px solid #E87722;border-radius:0 14px 14px 0;padding:16px 20px;margin-bottom:18px;font-family:Fraunces,Georgia,serif;font-size:17px;font-style:italic;line-height:1.9;\">Ain't it fine when things are going<br>Topsy-turvy and askew<br>To discover someone showing<br>Good old-fashioned faith in you?</div><p style=\"margin-bottom:8px;font-weight:800;color:#B45309;\">What is the poet saying here?</p><p style=\"margin-bottom:12px;\">The poet opens with a friendly question, as if chatting with us. <b>Ain't</b> is the informal, everyday way of saying <i>'is not'</i> — so the line means <i>'Isn't it fine...'</i>. He asks: isn't it a wonderful feeling when, right in the middle of a mess, you discover that someone truly believes in you?</p><p style=\"margin-bottom:12px;\"><b>Topsy-turvy</b> and <b>askew</b> paint the picture of that mess — a time when everything is confusing, upside down, and going wrong, not the way you expected. Think of a day when you lost your homework, missed the bus AND scored badly in a test — that is a topsy-turvy day.</p><p style=\"margin-bottom:12px;\">Now the surprise: the poet calls such a day <b>fine</b>! Why? Because trouble works like a torch — it lights up who your real friends are. Anyone can stand with you on a good day. But the person who shows <b>'good old-fashioned faith in you'</b> — steady, loyal trust, the kind grandparents talk about — reveals themselves only when things go wrong. Hard times don't just test us; they <i>introduce</i> us to our true friends.</p>",
            "highlighted_words": [
              {
                "word": "ain't",
                "meaning": "(here) short form of 'is not'"
              },
              {
                "word": "topsy-turvy",
                "meaning": "confusing or chaotic"
              },
              {
                "word": "askew",
                "meaning": "(here) wrong or not as one expects"
              }
            ],
            "comprehension_check": {
              "question": "Things going 'topsy-turvy' sounds bad. So why does the poet call it 'fine'?",
              "options": [
                "Because the poet enjoys chaos and confusion",
                "Because hard times are exactly when we discover a friend's true faith in us",
                "Because problems always solve themselves in the end",
                "Because the poet is being sarcastic about bad days"
              ],
              "correct": 1,
              "explanation": "The poet is not praising the chaos itself. He is saying that difficult, confusing times become 'fine' because that is when a loyal friend shows 'good old-fashioned faith' in us — hard times reveal true friends."
            }
          },
          {
            "id": "panel_2",
            "panel_title": "Stanza 2 — The Cheery Handclasp",
            "narration_text": "<div style=\"background:#FFF8EE;border-left:5px solid #E87722;border-radius:0 14px 14px 0;padding:16px 20px;margin-bottom:18px;font-family:Fraunces,Georgia,serif;font-size:17px;font-style:italic;line-height:1.9;\">Ain't it good when life seems dreary<br>And your hopes about to end,<br>Just to feel the handclasp cheery<br>Of a fine old loyal friend?</div><p style=\"margin-bottom:8px;font-weight:800;color:#B45309;\">What is the poet saying here?</p><p style=\"margin-bottom:12px;\">This stanza goes deeper — from a messy day to a truly sad one. <b>Dreary</b> means dull and gloomy, the kind of grey mood where nothing feels exciting. And <i>'your hopes about to end'</i> means you are close to giving up completely.</p><p style=\"margin-bottom:12px;\">Into this gloom, the poet places one small action: a <b>handclasp</b> — a warm holding or shaking of hands — and it is <b>cheery</b>, full of brightness and good spirit. Notice what the handclasp does NOT do: it does not solve the problem, return lost marks, or fix what broke. It simply says, without words, <i>'I am here. You are not alone.'</i></p><p style=\"margin-bottom:12px;\">That is the poet's quiet lesson: when someone is losing hope, they don't always need advice or solutions — they need <i>presence</i>. A loyal friend's simple touch can refill an empty heart faster than a hundred clever words. Small gesture, giant effect.</p>",
            "highlighted_words": [
              {
                "word": "dreary",
                "meaning": "making you feel sad"
              },
              {
                "word": "handclasp",
                "meaning": "the act of holding and shaking hands"
              },
              {
                "word": "cheery",
                "meaning": "bright and happy"
              }
            ],
            "comprehension_check": {
              "question": "When life seems dreary and hopes are about to end, what does the friend's 'handclasp cheery' actually give the speaker?",
              "options": [
                "Money to solve all the problems",
                "A clever plan to fix everything",
                "Comfort and courage — the feeling that he is not alone",
                "A reason to give up hope quietly"

              "correct": 2,
              "explanation": "The handclasp does not solve the problem itself. It gives emotional support — warmth, comfort and courage. Knowing a loyal friend stands beside you makes even a dreary time easier to bear."

          {
            "id": "panel_3",
            "panel_title": "Stanza 3 — Living for Each Other",
            "narration_text": "<div style=\"background:#FFF8EE;border-left:5px solid #E87722;border-radius:0 14px 14px 0;padding:16px 20px;margin-bottom:18px;font-family:Fraunces,Georgia,serif;font-size:17px;font-style:italic;line-height:1.9;\">Gosh! one fellow to another<br>Means a lot from day to day,<br>Seems we're living for each other<br>In a friendly sort of way.</div><p style=\"margin-bottom:8px;font-weight:800;color:#B45309;\">What is the poet saying here?</p><p style=\"margin-bottom:12px;\"><b>Gosh!</b> is a burst of wonder — the poet has just realised something big and can't hold it in. A <b>fellow</b> here simply means a person, a friend. What one person means to another, he says, matters <i>'from day to day'</i> — not only in emergencies, but in ordinary, everyday life.</p><p style=\"margin-bottom:12px;\">Then comes the most important line of the whole poem: <i>'Seems we're living for each other.'</i> The poet suggests that the real purpose of our daily life is quietly connected to other people — we study, work, play and grow not just for ourselves, but because we matter to someone and someone matters to us.</p><p style=\"margin-bottom:12px;\">And he adds <i>'in a friendly sort of way'</i> — this caring is not heavy or dramatic. It is light, natural and easy, like sharing your lunch or saving a seat. Friendship, the poet says, is what gives ordinary days their meaning.</p>",
            "highlighted_words": [
              {
                "word": "fellow",
                "meaning": "(here) a person, a friend"
              }
            ],
            "comprehension_check": {
              "question": "What does the poet mean when he says we are 'living for each other in a friendly sort of way'?",
              "options": [
                "Friends must live in the same house together",
                "Our everyday lives gain meaning by caring for and supporting one another",
                "We should only think about ourselves from day to day",
                "People cannot survive without sharing food"
              ],
              "correct": 1,
              "explanation": "The poet means that friendship gives daily life its meaning. One person matters 'a lot from day to day' to another — we quietly support each other, and that mutual care is what makes life rich."
            }
          },
          {
            "id": "panel_4",
            "panel_title": "Stanza 4 — Keep Repeating Smiles",
            "narration_text": "<div style=\"background:#FFF8EE;border-left:5px solid #E87722;border-radius:0 14px 14px 0;padding:16px 20px;margin-bottom:18px;font-family:Fraunces,Georgia,serif;font-size:17px;font-style:italic;line-height:1.9;\">When a smile or cheerful greetin'<br>Means so much to fellows sore,<br>Seems we ought to keep repeatin'<br>Smiles an' praises more an' more.</div><p style=\"margin-bottom:8px;font-weight:800;color:#B45309;\">What is the poet saying here?</p><p style=\"margin-bottom:12px;\">The final stanza turns the poem into advice for US. <b>Sore</b> here does not mean an injury — it means <i>upset and angry</i> inside. To such a person, even a tiny thing — a smile, a cheerful <i>'Good morning!'</i> — <i>'means so much'</i>.</p><p style=\"margin-bottom:12px;\">So the poet draws his conclusion: we <i>'ought to keep repeatin''</i> these small kindnesses — <i>'more an' more'</i>. The keyword is <b>repeating</b>. One smile on one day is nice; but people feel low on many days, so kindness must become a daily habit, like brushing your teeth — not a one-time festival.</p><p style=\"margin-bottom:12px;\">Notice the shortened words — <b>greetin'</b>, <b>repeatin'</b>, <b>an'</b>. The poet deliberately drops letters to sound casual and warm, like a friend talking beside you, not a teacher lecturing you. The style itself is friendly — perfectly matching a poem about friendship.</p>",

            "comprehension_check": {

              "options": [
                "Because smiling is good exercise for the face",

                "Because small kind gestures mean so much to upset people that kindness should be a daily habit, not a one-time act",

              "correct": 2,
              "explanation": "A smile or cheerful greeting 'means so much' to someone feeling sore (upset). Since people feel low on many days, kindness must be repeated again and again — the poet wants kindness to become a habit."

          {
            "id": "panel_5",
            "panel_title": "About the Poet & the Poem's Music",
            "narration_text": "<p style=\"margin-bottom:8px;font-weight:800;color:#B45309;\">About the poet</p><p style=\"margin-bottom:12px;\"><b>Edgar A Guest</b> (1881–1959) was a British-born American poet. He began his career at the <i>Detroit Free Press</i>, first as a copy boy and later as a police reporter, before becoming famous for his daily rhyming poems. His first published collection was <i>A Heap o' Livin'</i> (1916), and he is also well known for <i>Just Folks</i> (1917). In 1952, he was named the Poet Laureate of Michigan.</p><p style=\"margin-bottom:8px;font-weight:800;color:#B45309;\">The poem's music: rhyme scheme</p><p style=\"margin-bottom:12px;\">A <b>rhyme scheme</b> is the pattern of rhymes at the end of the lines, written using letters. Look at stanza 1: <i>going</i> (A), <i>askew</i> (B), <i>showing</i> (A — it rhymes with 'going'), <i>you</i> (B — it rhymes with 'askew'). So the pattern is <b>ABAB</b>. Check the other stanzas — every one of them follows the same ABAB see-saw of sounds, which gives the poem its light, song-like bounce.</p><p style=\"margin-bottom:8px;font-weight:800;color:#B45309;\">Why the informal words?</p><p style=\"margin-bottom:12px;\">The poet wrote a poem every day for ordinary newspaper readers, so he used relaxed words like <i>ain't</i>, <i>greetin'</i> and <i>an'</i> on purpose. A poem about simple, everyday friendship should <i>sound</i> like simple, everyday talk — the style shakes hands with the message.</p>",
