    const s3 = this.data.stage_3_think;
    let s3Score = 0;
    const s3Problems = s3.problems;
    const hasSelfChecks = s3Problems.some(p => p.self_check_criteria && p.self_check_criteria.length > 0);
    if (hasSelfChecks) {
      let totalStars = 0;
      let maxStars = 0;
      s3Problems.forEach(p => {
        const sub = this.state.thinkSubmissions[p.id] || {};
        const criteria = p.self_check_criteria || [];
        maxStars += criteria.length;
        if (sub.submitted) {
          totalStars += (sub.selfChecks || []).length;
        }
      });
      s3Score = maxStars > 0 ? Math.round((totalStars / maxStars) * 25) : 0;
    } else {
      const submittedCount = s3Problems.filter(p => this.state.thinkSubmissions[p.id] && this.state.thinkSubmissions[p.id].submitted).length;
      s3Score = Math.round((submittedCount / s3Problems.length) * 25);
    }

    // Stage 4: scale to 25.
    const s4 = this.data.stage_4_test;
    const breakdown = this.gradeTestQuestions();
    const autoScore = breakdown.reduce((sum, b) => sum + b.marks_awarded, 0);
    const manualPotential = breakdown.filter(b => b.needs_manual).reduce((sum, b) => sum + b.q.marks, 0);
    // Optimistic for display
    const optimisticTotal = autoScore + manualPotential;
    const s4Max = s4.total_marks || 25;
    const s4Score = Math.round((optimisticTotal / s4Max) * 25);

    return {
      stage1: { score: s1Score, max: 25 },
      stage2: { score: s2Score, max: 25 },
      stage3: { score: s3Score, max: 25 },
      stage4: { score: s4Score, max: 25, manualMarks: manualPotential, breakdown, rawAutoScore: autoScore, rawTotal: s4Max },
      grandTotal: s1Score + s2Score + s3Score + s4Score,
    };
  },

  gradeTestQuestions() {
    const s = this.data.stage_4_test;
    const out = [];
    s.sections.forEach(sec => {
      sec.questions.forEach(q => {
        const ans = this.state.testAnswers[q.id] || {};
        const userAnswer = (ans.value !== undefined ? String(ans.value) : '').trim();

        if (q.type === 'mcq') {
          const correct = userAnswer.toLowerCase() === String(q.correct_answer || '').toLowerCase();
          out.push({
            q, section: sec, user_answer: userAnswer,
            correct_display: q.correct_answer || '',
            is_correct: correct,
            marks_awarded: correct ? q.marks : 0,
            needs_manual: false,
          });
        } else if (q.type === 'fill_blank') {
          const norm = (s) => s.toLowerCase().trim().replace(/[.,;:!?'"]/g, '').replace(/\s+/g, ' ');
          const correct = norm(userAnswer) === norm(String(q.correct_answer || ''));
          out.push({
            q, section: sec, user_answer: userAnswer,
            correct_display: q.correct_answer || '',
            is_correct: correct,
            marks_awarded: correct ? q.marks : 0,
            needs_manual: false,
          });
        } else {
          // short_answer or subjective — needs manual grading
          out.push({
            q, section: sec, user_answer: userAnswer,
            correct_display: '(See model answer)',
            is_correct: null,
            marks_awarded: 0,
            needs_manual: true,
          });
        }
      });
    });
    return out;
  },

  renderResults() {
    const scores = this.computeStageScores();
    const s4 = this.data.stage_4_test;
    const s4Max = s4.total_marks || 20;
    const breakdown = scores.stage4.breakdown;
    const autoScore = scores.stage4.rawAutoScore;
    const manualMarks = scores.stage4.manualMarks;
    // Manual marks state — parent can adjust
    const manualState = this.state.manualMarksAwarded || {};
    let manualAwarded = 0;
    breakdown.filter(b => b.needs_manual).forEach(b => {
      manualAwarded += (manualState[b.q.id] !== undefined ? manualState[b.q.id] : 0);
    });
    const testScore = autoScore + manualAwarded;

    // Badge and message from score_tiers in JSON
    const tiers = s4.score_tiers || [];
    let tierMsg = 'Keep practising!';
    let tierEmoji = '🌱';
    for (const tier of tiers) {
      if (testScore >= tier.min && testScore <= tier.max) { tierMsg = tier.message; break; }
    }
    if (testScore >= s4Max * 0.95) tierEmoji = '🏆';
    else if (testScore >= s4Max * 0.8) tierEmoji = '⭐';
    else if (testScore >= s4Max * 0.6) tierEmoji = '✨';
    else tierEmoji = '🌱';

    const quotes = this.data.motivational_quotes || ["Every champion was once a beginner."];
    const quote = quotes[Math.floor(Math.random() * quotes.length)];
    const confetti = testScore >= s4Max * 0.8 ? this.generateConfetti() : '';

    // Stars for stages 1-3
    const s1Stars = this.computeStage1Stars();
    const s2Stars = this.computeStage2Stars();
    const s3Stars = this.computeStage3Stars();

    return `
      <div class="results-screen">
        <div class="results-hero">
          ${confetti}
          <div class="badge-circle ${testScore < s4Max * 0.6 ? 'no-badge' : ''}">
            <span class="badge-emoji">${tierEmoji}</span>
          </div>
          <h2 class="badge-name">${this.escapeHtml(tierMsg)}</h2>
          <div class="results-percentage">
            <div class="percentage-num">${testScore}/${s4Max}</div>
            <div class="percentage-label">परीक्षा अंक</div>
          </div>
        </div>

        <div class="motivational-quote">${this.escapeHtml(quote)}</div>

        <div class="section-scores">
          <h3>हर भाग में आपका प्रदर्शन</h3>
          <div class="scores-table">
            ${this.renderStarCell('📖', 'सीखें', s1Stars.earned, s1Stars.total)}
            ${this.renderStarCell('✏️', 'अभ्यास', s2Stars.earned, s2Stars.total)}
            ${this.renderStarCell('💭', 'सोचें', s3Stars.earned, s3Stars.total)}
            ${this.renderMarksCell('🏆', 'परीक्षा', testScore, s4Max)}
          </div>
        </div>

        <div class="reattempt-card">
          <h4>और बेहतर कर सकते हैं? 🎯</h4>
          <p>परीक्षा दोबारा दें — अपने अंक बेहतर करने का प्रयास करें!</p>
          <button class="reattempt-btn" data-retake-test="1">↻ परीक्षा दोबारा दें</button>
        </div>

        <div class="results-detail">
          <h4>परीक्षा — आपके उत्तरों की समीक्षा</h4>
          ${breakdown.map((b, i) => {
            const qType = b.q.type || '';
            const optionLetters = ['A','B','C','D','E','F'];
            let userDisplay = b.user_answer || '(not answered)';
            let correctDisplay = b.correct_display || '';

            // For MCQs show option letter + text
            if (qType === 'mcq' && b.q.options) {
              const userIdx = optionLetters.indexOf(b.user_answer.toUpperCase());
              if (userIdx >= 0 && b.q.options[userIdx]) {
                userDisplay = b.user_answer.toUpperCase() + ': ' + b.q.options[userIdx];
              }
              const correctIdx = optionLetters.indexOf((b.q.correct_answer || '').toUpperCase());
              if (correctIdx >= 0 && b.q.options[correctIdx]) {
                correctDisplay = b.q.correct_answer.toUpperCase() + ': ' + b.q.options[correctIdx];
              }
            }

            return `
            <div class="review-item">
              <div class="review-q">
                <strong>Q${i+1}.</strong> <em>${this.escapeHtml(b.section.title)}</em><br>
                ${this.escapeHtml(b.q.question)}
              </div>
              <div class="review-content">
                ${b.needs_manual ? `
                  <div class="review-row"><strong>Your answer:</strong> "${this.escapeHtml(b.user_answer || '(not answered)')}"</div>
                  ${b.q.model_answer ? `<div class="review-row"><strong>Model:</strong> ${this.escapeHtml(b.q.model_answer)}</div>` : ''}
                  ${b.q.marking_guide ? `<div class="review-row" style="font-style:italic;color:var(--ink-soft);font-size:13px;"><strong>For parent:</strong> ${this.escapeHtml(b.q.marking_guide)}</div>` : ''}
                  <div class="review-result manual" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <span>अंक (${b.q.marks} में से):</span>
                    <button class="btn btn-secondary" style="padding:4px 10px;min-width:32px;" data-manual-marks-dec="${this.escapeAttr(b.q.id)}">−</button>
                    <strong style="font-size:18px;min-width:24px;text-align:center;">${manualState[b.q.id] !== undefined ? manualState[b.q.id] : 0}</strong>
                    <button class="btn btn-secondary" style="padding:4px 10px;min-width:32px;" data-manual-marks-inc="${this.escapeAttr(b.q.id)}">+</button>
                  </div>
                ` : `
                  <div class="review-row"><strong>Your answer:</strong> ${this.escapeHtml(userDisplay)}</div>
                  <div class="review-row"><strong>सही उत्तर:</strong> ${this.escapeHtml(correctDisplay)}</div>
                  <div class="review-result ${b.is_correct ? 'correct' : 'incorrect'}">${b.is_correct ? `✓ +${b.marks_awarded}` : `✗ 0 / ${b.q.marks}`}</div>
                `}
              </div>
            </div>`;
          }).join('')}
        </div>

        <div class="results-actions">
          <button class="btn btn-secondary" data-back-home="1">← Back to Stages</button>
        </div>
      </div>
    `;
  },

  computeStage1Stars() {
    const s1 = this.data.stage_1_learn;
    let earned = 0, total = 0;
    s1.branches.forEach(b => {
      if (b.type === 'concept_teaching' && b.cards) {
        b.cards.forEach(c => {
          if (c.check) {
            total++;
            const a = this.state.panelChecks[c.id];
            if (a && a.selected === c.check.correct) earned++;
          }
        });
      } else if (b.type === 'story_panels' && b.panels) {
        b.panels.forEach(p => {
          if (p.comprehension_check) {
            total++;
            const a = this.state.panelChecks[p.id];
            if (a && a.selected === p.comprehension_check.correct) earned++;
          }
        });
      } else if (b.type === 'vocabulary_cards' && b.cards) {
        b.cards.forEach(c => {
          total++;
          const a = this.state.spotItAnswers[c.id];
          if (a && a.correct) earned++;
        });
      }
    });
    return { earned, total };
  },

  computeStage2Stars() {
    const s2 = this.data.stage_2_practice;
    let earned = 0, total = 0;
    s2.sections.forEach(sec => {
      sec.questions.forEach(q => {
        total++;
        const a = this.state.practiceAnswers[q.id];
        if (a && a.selected === q.correct) earned++;
      });
    });
    return { earned, total };
  },

  computeStage3Stars() {
    const s3 = this.data.stage_3_think;
    let earned = 0, total = 0;
    s3.problems.forEach(p => {
      if (p.self_check_criteria) {
        total += p.self_check_criteria.length;
        const sub = this.state.thinkSubmissions[p.id] || {};
        earned += (sub.selfChecks || []).length;
      }
    });
    return { earned, total };
  },

  renderStarCell(icon, label, earned, total) {
    const pct = total > 0 ? (earned / total) * 100 : 0;
    let cls = '', tag = '';
    if (pct >= 80) { cls = 'strong'; tag = '<span class="score-cell-tag strong-tag">Strong</span>'; }
    else if (pct < 50) { cls = 'improvement'; tag = '<span class="score-cell-tag improve-tag">और अभ्यास करें</span>'; }
    else { tag = '<span class="score-cell-tag neutral-tag">Good</span>'; }
    return `
      <div class="score-cell ${cls}">
        <div class="score-cell-icon">${icon}</div>
        <div class="score-cell-label">${label}</div>
        <div class="score-cell-num">${earned} ⭐</div>
        <div class="score-cell-out-of">${total} में से</div>
        ${tag}
      </div>
    `;
  },

  renderMarksCell(icon, label, score, max) {
    const pct = max > 0 ? (score / max) * 100 : 0;
    let cls = '', tag = '';
    if (pct >= 80) { cls = 'strong'; tag = '<span class="score-cell-tag strong-tag">Strong</span>'; }
    else if (pct < 50) { cls = 'improvement'; tag = '<span class="score-cell-tag improve-tag">और अभ्यास करें</span>'; }
    else { tag = '<span class="score-cell-tag neutral-tag">Good</span>'; }
    return `
      <div class="score-cell ${cls}">
        <div class="score-cell-icon">${icon}</div>
        <div class="score-cell-label">${label}</div>
        <div class="score-cell-num">${score}</div>
        <div class="score-cell-out-of">${max} में से</div>
        ${tag}
      </div>
    `;
  },

  generateConfetti() {
    const colors = ['#E87722', '#F4A82C', '#D4A53A', '#4A7C59', '#5B8DB8', '#B8385E', '#FFFFFF'];
    let html = '';
    for (let i = 0; i < 30; i++) {
      const left = Math.random() * 100;
      const delay = Math.random() * 3;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const rotate = Math.random() * 360;
      html += `<div class="confetti-piece" style="left:${left}%;background:${color};animation-delay:${delay}s;transform:rotate(${rotate}deg);"></div>`;
    }
    return html;
  },

  renderStageNav() {
    const canPrev = this.currentStage > 1;
    const canNext = this.currentStage < 4 && this.isStageUnlocked(this.currentStage + 1);
    const stageLabels = ['', 'सीखें', 'अभ्यास', 'सोचें', 'परीक्षा'];
    return `
      <div class="stage-nav">
        ${canPrev ? `<button class="btn btn-secondary" data-stage-nav="prev">← Back to ${stageLabels[this.currentStage - 1]}</button>` : '<div></div>'}
        ${canNext ? `<button class="btn btn-primary" data-stage-nav="next">अगला: ${stageLabels[this.currentStage + 1]} →</button>` : (this.currentStage < 4 ? `<button class="btn btn-primary" disabled title="Complete current stage first">Next: ${stageLabels[this.currentStage + 1]} →</button>` : '<div></div>')}
      </div>
    `;
  },

  bindEvents() {
    // Use document.body so the listener survives across renders.
    // Called ONCE in init().
    document.body.addEventListener('click', (e) => {
      const t = e.target;

      if (t.dataset && t.dataset.closeModal) { this.state.spotItModal = null; this.render(); return; }
      if (t.classList && t.classList.contains('highlight-word')) { this.showWordTooltip(t); return; }

      const target = t.closest('[data-stage], [data-enter-branch], [data-back-to-branches], [data-panel-nav], [data-panel-check], [data-flip-card], [data-open-spot-it], [data-spot-answer], [data-enter-section], [data-back-to-sections], [data-practice-answer], [data-show-hint], [data-stage-nav], [data-vocab-group], [data-reset-progress], [data-jump-to-panel], [data-think-submit], [data-think-edit], [data-start-test], [data-submit-test], [data-retake-test], [data-back-home], [data-test-mcq], [data-self-check], [data-manual-marks-inc], [data-manual-marks-dec], [data-open-deep-dive], [data-close-deep-dive], [data-dd-topic]');
      if (!target) return;

      if (target.dataset.resetProgress) {
        this.resetProgress();
        return;
      }
      if (target.dataset.jumpToPanel !== undefined) {
        const idx = parseInt(target.dataset.jumpToPanel, 10);
        if (!isNaN(idx)) {
          this.currentPanelIdx = idx;
          this.render();
          window.scrollTo(0, 0);
        }
        return;
      }
      // Deep Dive navigation
      if (target.dataset.openDeepDive !== undefined) {
        this.previousStage = this.currentStage;
        this.currentStage = 0;
        this.deepDiveTopicIdx = 0;
        this.render();
        window.scrollTo(0, 0);
        return;
      }
      if (target.dataset.closeDeepDive !== undefined) {
        this.currentStage = this.previousStage || 1;
        this.render();
        window.scrollTo(0, 0);
        return;
      }
      if (target.dataset.ddTopic !== undefined) {
        const idx = parseInt(target.dataset.ddTopic, 10);
        const dd = this.data.stage_0_deep_dive;
        if (dd && idx >= 0 && idx < dd.topics.length) {
          this.deepDiveTopicIdx = idx;
          this.render();
          window.scrollTo(0, 0);
        }
        return;
      }
      if (target.dataset.stage) {
        const num = parseInt(target.dataset.stage, 10);
        if (this.isStageUnlocked(num) || num === this.currentStage) {
          this.currentStage = num;
          this.currentBranch = null;
          this.currentSection = null;
          this.saveProgress();
          this.render();
          window.scrollTo(0, 0);
        }
        return;
      }
      if (target.dataset.enterBranch) {
        this.currentBranch = target.dataset.enterBranch;
        this.currentPanelIdx = 0;
        this.render();
        window.scrollTo(0, 0);
        return;
      }
      if (target.dataset.backToBranches) {
        this.currentBranch = null;
        this.render();
        window.scrollTo(0, 0);
        return;
      }
      if (target.dataset.panelNav) {
        const branch = this.data.stage_1_learn.branches.find(b => b.id === this.currentBranch);
        const items = branch.panels || branch.cards || [];
        if (target.dataset.panelNav === 'prev' && this.currentPanelIdx > 0) this.currentPanelIdx--;
        else if (target.dataset.panelNav === 'next' && this.currentPanelIdx < items.length - 1) this.currentPanelIdx++;
        else if (target.dataset.panelNav === 'finish-branch') { this.currentBranch = null; this.saveProgress(); }
        this.render();
        window.scrollTo(0, 0);
        return;
      }
      if (target.dataset.panelCheck) {
        const panelId = target.dataset.panelCheck;
        const opt = parseInt(target.dataset.opt, 10);
        if (this.state.panelChecks[panelId] && this.state.panelChecks[panelId].selected !== undefined) return;
        this.state.panelChecks[panelId] = { ...(this.state.panelChecks[panelId] || {}), selected: opt };
        this.saveProgress();
        this.render();
        return;
      }
      if (target.dataset.flipCard) {
        if (e.target.closest('[data-open-spot-it]')) return;
        const id = target.dataset.flipCard;
        this.state.cardFlips[id] = !this.state.cardFlips[id];
        // Toggle the class directly on the live element so CSS transition animates.
        // No full re-render — that would destroy the element and skip the animation.
        target.classList.toggle('flipped');
        this.saveProgress();
        return;
      }
      if (target.dataset.vocabGroup) {
        this.currentVocabGroup = target.dataset.vocabGroup;
        this.render();
        return;
      }
      if (target.dataset.openSpotIt) {
        e.stopPropagation();
        this.state.spotItModal = target.dataset.openSpotIt;
        this.render();
        return;
      }
      if (target.dataset.spotAnswer) {
        const id = target.dataset.spotAnswer;
        const opt = parseInt(target.dataset.opt, 10);
        if (this.state.spotItAnswers[id] !== undefined) return;
        let card = null;
        for (const branch of this.data.stage_1_learn.branches) {
          if (branch.cards) { card = branch.cards.find(c => c.id === id); if (card) break; }
        }
        if (!card) return;
        this.state.spotItAnswers[id] = { selected: opt, correct: opt === card.spot_it.correct };
        this.saveProgress();
        this.render();
        return;
      }
      if (target.dataset.enterSection) {
        this.currentSection = target.dataset.enterSection;
        this.render();
        window.scrollTo(0, 0);
        return;
      }
      if (target.dataset.backToSections) {
        this.currentSection = null;
        this.render();
        window.scrollTo(0, 0);
        return;
      }
      if (target.dataset.practiceAnswer) {
        const qid = target.dataset.practiceAnswer;
        const opt = parseInt(target.dataset.opt, 10);
        if (this.state.practiceAnswers[qid] && this.state.practiceAnswers[qid].selected !== undefined) return;
        this.state.practiceAnswers[qid] = { ...(this.state.practiceAnswers[qid] || {}), selected: opt };
        this.saveProgress();
        this.render();
        return;
      }
      if (target.dataset.showHint) {
        const qid = target.dataset.showHint;
        this.state.practiceAnswers[qid] = { ...(this.state.practiceAnswers[qid] || {}), showHint: true };
        this.saveProgress();
        this.render();
        return;
      }
      // Stage 3 — submit a Think problem
      if (target.dataset.thinkSubmit) {
        const pid = target.dataset.thinkSubmit;
        const ta = document.querySelector(`[data-think-input="${CSS.escape(pid)}"]`);
        const value = ta ? ta.value.trim() : '';
        if (!value) {
          alert('कृपया जमा करने से पहले अपना उत्तर लिखें।');
          return;
        }
        this.state.thinkSubmissions[pid] = { value, submitted: true };
        this.saveProgress();
        this.render();
        return;
      }
      // Stage 3 — edit (un-submit)
      if (target.dataset.thinkEdit) {
        const pid = target.dataset.thinkEdit;
        const existing = this.state.thinkSubmissions[pid] || {};
        this.state.thinkSubmissions[pid] = { ...existing, submitted: false };
        this.saveProgress();
        this.render();
        return;
      }
      // Stage 3 — self-check criteria toggle
      if (target.dataset.selfCheck) {
        const pid = target.dataset.selfCheck;
        const ci = parseInt(target.dataset.checkIdx, 10);
        const existing = this.state.thinkSubmissions[pid] || {};
        const checks = [...(existing.selfChecks || [])];
        const idx = checks.indexOf(ci);
        if (idx >= 0) checks.splice(idx, 1); else checks.push(ci);
        this.state.thinkSubmissions[pid] = { ...existing, selfChecks: checks };
        this.saveProgress();
        this.render();
        return;
      }
      // Results — manual marks adjustment
      if (target.dataset.manualMarksInc) {
        const qid = target.dataset.manualMarksInc;
        if (!this.state.manualMarksAwarded) this.state.manualMarksAwarded = {};
        const q = this.findTestQuestion(qid);
        const max = q ? q.marks : 5;
        const current = this.state.manualMarksAwarded[qid] || 0;
        if (current < max) { this.state.manualMarksAwarded[qid] = current + 1; this.saveProgress(); this.render(); }
        return;
      }
      if (target.dataset.manualMarksDec) {
        const qid = target.dataset.manualMarksDec;
        if (!this.state.manualMarksAwarded) this.state.manualMarksAwarded = {};
        const current = this.state.manualMarksAwarded[qid] || 0;
        if (current > 0) { this.state.manualMarksAwarded[qid] = current - 1; this.saveProgress(); this.render(); }
        return;
      }
      // Stage 4 — start the test
      if (target.dataset.startTest) {
        this.startTest();
        return;
      }
      // Stage 4 — MCQ click
      if (target.dataset.testMcq) {
        // Capture text inputs first so we don't lose typed values on re-render
        this.captureTestInputs();
        const qid = target.dataset.testMcq;
        const value = target.dataset.value;
        this.state.testAnswers[qid] = { value };
        this.render();
        return;
      }
      // Stage 4 — submit
      if (target.dataset.submitTest) {
        if (!confirm('परीक्षा जमा करें? इसके बाद आप अपने उत्तर नहीं बदल पाएंगे।')) return;
        this.submitTest();
        return;
      }
      // Results — retake test
      if (target.dataset.retakeTest) {
        this.retakeTest();
        return;
      }
      // Results — back home
      if (target.dataset.backHome) {
        this.currentStage = 1;
        this.saveProgress();
        this.render();
        window.scrollTo(0, 0);
        return;
      }
      if (target.dataset.stageNav === 'prev') {
        this.currentStage = Math.max(1, this.currentStage - 1);
        this.currentBranch = null; this.currentSection = null;
        this.stopTimer();
        this.saveProgress();
        this.render();
        window.scrollTo(0, 0);
        return;
      }
      if (target.dataset.stageNav === 'next') {
        if (this.isStageUnlocked(this.currentStage + 1)) {
          this.currentStage = Math.min(4, this.currentStage + 1);
          this.currentBranch = null; this.currentSection = null;
          this.stopTimer();
          this.saveProgress();
          this.render();
          window.scrollTo(0, 0);
        }
        return;
      }
    });

    // Input listener for Think textareas + Test text inputs — live word count, save state
    document.body.addEventListener('input', (e) => {
      const t = e.target;
      // Stage 3 — Think problems
      if (t.dataset && t.dataset.thinkInput) {
        const pid = t.dataset.thinkInput;
        const value = t.value;
        const existing = this.state.thinkSubmissions[pid] || {};
        this.state.thinkSubmissions[pid] = { ...existing, value, submitted: false };
        // Update word counter directly without re-render (preserves cursor)
        const counter = document.querySelector(`[data-counter-for="${CSS.escape(pid)}"]`);
        if (counter) {
          const wc = this.countWords(value);
          // Find the original problem to read word_limit
          const problem = this.data.stage_3_think.problems.find(p => p.id === pid);
          const limit = problem ? problem.word_limit : '';
          counter.textContent = `${wc} word${wc === 1 ? '' : 's'}${limit ? ` · target: ${limit}` : ''}`;
          counter.className = 'word-counter ' + this.wordCounterClass(wc, limit);
        }
        return;
      }
      // Stage 4 — Test text inputs
      if (t.dataset && t.dataset.testInput) {
        const qid = t.dataset.testInput;
        const value = t.value;
        this.state.testAnswers[qid] = { ...(this.state.testAnswers[qid] || {}), value };
        // Update word counter for short_answer / subjective
        const counter = document.querySelector(`[data-counter-for="${CSS.escape(qid)}"]`);
        if (counter) {
          const wc = this.countWords(value);
          let limit = '';
          // Find the question for word_limit
          for (const sec of this.data.stage_4_test.sections) {
            const q = sec.questions.find(q => q.id === qid);
            if (q) { limit = q.word_limit || ''; break; }
          }
          counter.textContent = `${wc} word${wc === 1 ? '' : 's'}${limit ? ` · target: ${limit}` : ''}`;
          counter.className = 'word-counter ' + this.wordCounterClass(wc, limit);
        }
        return;
      }
    });
  },

  showWordTooltip(el) {
    document.querySelectorAll('.word-tooltip').forEach(t => t.remove());
    const panelId = el.dataset.panelId;
    const idx = parseInt(el.dataset.wordIdx, 10);
    const branch = this.data.stage_1_learn.branches.find(b => b.id === this.currentBranch);
    if (!branch) return;
    const panel = branch.panels.find(p => p.id === panelId);
    if (!panel || !panel.highlighted_words || !panel.highlighted_words[idx]) return;
    const tip = document.createElement('span');
    tip.className = 'word-tooltip';
    tip.textContent = panel.highlighted_words[idx].meaning;
    el.appendChild(tip);
    setTimeout(() => tip.remove(), 3000);
  },

  escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  },

  findTestQuestion(qid) {
    if (!this.data.stage_4_test) return null;
    for (const sec of this.data.stage_4_test.sections) {
      const q = sec.questions.find(q => q.id === qid);
      if (q) return q;
    }
    return null;
  },
  escapeAttr(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>

</body>
