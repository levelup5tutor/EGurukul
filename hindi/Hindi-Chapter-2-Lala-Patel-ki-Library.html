  // ============================================================
  // STAGE 3: THINK DEEPER
  // ============================================================
  renderStage3() {
    if (!this.isStageUnlocked(3)) {
      return `
        <div class="placeholder-card">
          <div class="placeholder-icon">🔒</div>
          <div class="placeholder-title">Complete Practice First</div>
          <p class="placeholder-detail">Finish all of Practice before unlocking Think Deeper.</p>
        </div>
        ${this.renderStageNav()}
      `;
    }
    const s = this.data.stage_3_think;
    const submittedCount = s.problems.filter(p => this.state.thinkSubmissions[p.id] && this.state.thinkSubmissions[p.id].submitted).length;

    return `
      <div class="stage-header">
        <h2 class="stage-title">${this.escapeHtml(s.title)}</h2>
        <p class="stage-description">${this.escapeHtml(s.description)} · <strong>${submittedCount}/${s.problems.length} submitted</strong></p>
      </div>
      ${s.problems.map((p, i) => this.renderThinkProblem(p, i + 1)).join('')}
      ${this.renderStarsInfoCard(3)}
      ${this.renderStageNav()}
    `;
  },

  renderThinkProblem(p, num) {
    const sub = this.state.thinkSubmissions[p.id] || {};
    const isSubmitted = !!sub.submitted;
    const userAnswer = sub.value || '';
    const wordCount = this.countWords(userAnswer);
    const wordCounterClass = this.wordCounterClass(wordCount, p.word_limit);
    const hasSelfEval = p.type === 'subjective_self_eval' && Array.isArray(p.self_check_criteria) && p.self_check_criteria.length > 0;

    return `
      <div class="think-card ${isSubmitted ? 'submitted' : ''}" data-think-id="${this.escapeAttr(p.id)}">
        <div>
          <span class="question-number">${num}</span>
          ${p.category ? `<span class="question-category">${this.escapeHtml(p.category)}</span>` : ''}
          <span class="marks-tag stars-tag">⭐ 5</span>
          ${isSubmitted ? `<span class="submitted-tag">✓ Submitted</span>` : ''}
        </div>
        ${p.scenario ? `<div class="scenario-box">${this.escapeHtml(p.scenario)}</div>` : ''}
        <p class="question-text">${this.escapeHtml(p.question)}</p>
        ${p.word_limit ? `<div class="word-limit-tag">📝 Word limit: ${this.escapeHtml(p.word_limit)}</div>` : ''}
        <textarea
          class="text-input"
          rows="5"
          placeholder="Write your answer here..."
          data-think-input="${this.escapeAttr(p.id)}"
          ${isSubmitted ? 'readonly' : ''}>${this.escapeHtml(userAnswer)}</textarea>
        <div class="word-counter ${wordCounterClass}" data-counter-for="${this.escapeAttr(p.id)}">
          ${wordCount} word${wordCount === 1 ? '' : 's'}${p.word_limit ? ` · target: ${this.escapeHtml(p.word_limit)}` : ''}
        </div>
        <div class="question-actions">
          ${!isSubmitted
            ? `<button class="btn btn-success" data-think-submit="${this.escapeAttr(p.id)}">✓ Submit Answer</button>`
            : `<button class="btn btn-secondary" data-think-edit="${this.escapeAttr(p.id)}">✎ Edit Answer</button>`}
        </div>
        ${isSubmitted && hasSelfEval ? this.renderSelfCheckPanel(p, p.marks, { interactive: true, unit: 'stars' }) : ''}
        ${isSubmitted ? `
          <details class="model-answer-accordion">
            <summary>▶ See model answer & explanation</summary>
            <div class="model-answer-box">
              <span class="feedback-label">Model answer</span>
              <p class="answer-text">${this.escapeHtml(p.model_answer || '')}</p>
              ${p.explanation ? `
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--paper-dark);">
                  <span class="feedback-label" style="color: var(--leaf);">Why this works</span>
                  <p class="answer-text">${this.escapeHtml(p.explanation)}</p>
                </div>
              ` : ''}
              ${p.marking_guide_for_parent ? `
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--paper-dark);">
                  <span class="feedback-label" style="color: var(--berry);">For parent</span>
                  <p class="answer-text" style="font-size:13px;font-style:italic;">${this.escapeHtml(p.marking_guide_for_parent)}</p>
                </div>
              ` : ''}
            </div>
          </details>
        ` : ''}
      </div>
    `;
  },

  countWords(s) {
    if (!s || !s.trim()) return 0;
    return s.trim().split(/\s+/).length;
  },

  wordCounterClass(count, limit) {
    if (!limit) return '';
    const m = limit.match(/(\d+)\s*[-–]\s*(\d+)/);
    if (!m) return '';
    const min = parseInt(m[1], 10), max = parseInt(m[2], 10);
    if (count >= min && count <= max) return 'in-range';
    if (count > max) return 'over';
    return '';
  },

  // Parse min/max words from word_limit string. Returns null if no limit.
  wordLimitRange(limit) {
    if (!limit) return null;
    const m = String(limit).match(/(\d+)\s*[-–]\s*(\d+)/);
    if (!m) return null;
    return { min: parseInt(m[1], 10), max: parseInt(m[2], 10) };
  },

  // Score a subjective_self_eval question.
  // Returns: { marks, source } where source is 'parent' | 'self_check' | 'engagement'
  // Logic:
  //   - If parent override exists and is a number, use it (clamped to 0..maxMarks).
  //   - Else: if no answer or no criteria, score by engagement (any answer = full marks; deferred to old logic).
  //   - Else: base = (ticked / total) × maxMarks, then halve if word count below minimum.
  scoreSubjectiveSelfEval(q, maxMarks) {
    const submission = this.state.thinkSubmissions[q.id] || this.state.testAnswers[q.id] || {};
    const answer = (submission.value || '').trim();
    const override = this.state.parentOverrides[q.id];

    // Parent override wins
    if (override !== undefined && override !== null && override !== '') {
      const n = parseFloat(override);
      if (!isNaN(n)) {
        return { marks: Math.max(0, Math.min(maxMarks, Math.round(n))), source: 'parent' };
      }
    }

    // No answer = 0
    if (!answer) return { marks: 0, source: 'no_answer' };

    // No criteria = engagement-based fallback (full marks for submitting, like old behavior)
    if (!q.self_check_criteria || !Array.isArray(q.self_check_criteria) || q.self_check_criteria.length === 0) {
      return { marks: maxMarks, source: 'engagement' };
    }

    // Self-check based scoring
    const ticks = this.state.selfCheckTicks[q.id] || [];
    const tickedCount = ticks.filter(t => t === true).length;
    const total = q.self_check_criteria.length;
    let base = total > 0 ? (tickedCount / total) * maxMarks : 0;

    // Word count gate: if below minimum, halve the score
    const range = this.wordLimitRange(q.word_limit);
    if (range) {
      const wc = this.countWords(answer);
      if (wc < range.min) base = base * 0.5;
    }

    return { marks: Math.round(base), source: 'self_check' };
  },

  // Render the self-check panel for a subjective_self_eval question.
  // showAfterSubmit: true for Stage 3 (interactive after submit). For Stage 4 results review, also true after testSubmitted.
  renderSelfCheckPanel(q, maxMarks, options) {
    options = options || {};
    const interactive = options.interactive !== false;  // default true
    const unit = options.unit || 'marks';                // 'marks' or 'stars'
    const unitIcon = unit === 'stars' ? '⭐ ' : '';
    const unitLabel = unit === 'stars' ? 'stars' : 'marks';
    const ticks = this.state.selfCheckTicks[q.id] || [];
    const override = this.state.parentOverrides[q.id];
    const overrideStr = override !== undefined && override !== null ? String(override) : '';
    // Stars (Stage 3) use the simple 1+4 formula. Marks (Stage 4) use the proportional formula.
    let score;
    if (unit === 'stars') {
      const stars = this.scoreThinkProblemStars(q);
      const isOverride = override !== undefined && override !== null && override !== '';
      score = { marks: stars, source: isOverride ? 'parent' : 'self_check' };
    } else {
      score = this.scoreSubjectiveSelfEval(q, maxMarks);
    }

    return `
      <div class="self-check-panel">
        <div class="self-check-header">
          <span class="self-check-title">📋 Self-Check</span>
          <span class="self-check-score ${score.source === 'parent' ? 'parent' : ''}">
            ${unitIcon}${score.marks} / ${unit === 'stars' ? 5 : maxMarks} ${unitLabel}
            ${score.source === 'parent' ? '· parent override' : (score.source === 'self_check' ? '· self-graded' : '')}
          </span>
        </div>
        <p class="self-check-instructions">Tick the boxes for what you actually included in your answer:</p>
        <ul class="self-check-list">
          ${q.self_check_criteria.map((c, i) => {
            const isTicked = ticks[i] === true;
            return `
              <li>
                <label class="self-check-item">
                  <input type="checkbox" ${interactive ? '' : 'disabled'} ${isTicked ? 'checked' : ''} data-self-check="${this.escapeAttr(q.id)}" data-idx="${i}">
                  <span class="self-check-text">${this.escapeHtml(c)}</span>
                </label>
              </li>
            `;
          }).join('')}
        </ul>
        ${(() => {
          const submission = this.state.thinkSubmissions[q.id] || this.state.testAnswers[q.id] || {};
          const answer = (submission.value || '').trim();
          const wc = this.countWords(answer);
          const range = this.wordLimitRange(q.word_limit);
          if (range && wc < range.min && answer) {
            if (unit === 'stars') {
              return `<div class="word-gate-warning">⚠️ Your answer (${wc} words) is below the minimum (${range.min} words). You'll miss the 1 ⭐ for word-limit. Write a fuller answer to earn it.</div>`;
            }
            return `<div class="word-gate-warning">⚠️ Your answer (${wc} words) is below the minimum (${range.min} words). Score is halved. Try writing a fuller answer for full ${unitLabel}.</div>`;
          }
          return '';
        })()}
          return '';
        })()}
        <div class="parent-override-row">
          <label class="parent-override-label">
            <span>✎ Parent Review</span>
            <input type="number" min="0" max="${unit === 'stars' ? 5 : maxMarks}" step="1" placeholder="—"
                   value="${this.escapeAttr(overrideStr)}"
                   data-parent-override="${this.escapeAttr(q.id)}"
                   data-max="${unit === 'stars' ? 5 : maxMarks}"
                   class="parent-override-input">
            <span class="parent-override-suffix">/ ${unit === 'stars' ? 5 : maxMarks}</span>
          </label>
          <span class="parent-override-hint">Parent: leave blank to use self-grade. Type a number to override.</span>
        </div>
      </div>
    `;
  },

  // ============================================================
  // STAGE 4: TEST
  // ============================================================
  renderStage4() {
    if (!this.isStageUnlocked(4)) {
      return `
        <div class="placeholder-card">
          <div class="placeholder-icon">🔒</div>
          <div class="placeholder-title">Complete Think Deeper First</div>
          <p class="placeholder-detail">Finish all five Think Deeper questions before taking the test.</p>
        </div>
        ${this.renderStageNav()}
      `;
    }
    if (this.state.testSubmitted) return this.renderResults();
    if (this.state.testStartTime === null) return this.renderTestIntro();
    return this.renderTestActive();
  },

  renderTestIntro() {
    const s = this.data.stage_4_test;
    const minutes = Math.floor((s.duration_seconds || 2400) / 60);
    const totalQuestions = s.sections.reduce((sum, sec) => sum + sec.questions.length, 0);

    return `
      <div class="test-intro">
        <div class="test-intro-icon">🏆</div>
        <h2>${this.escapeHtml(s.title)}</h2>
        <p class="test-intro-subtitle">${this.escapeHtml(s.subtitle || '')}</p>
        <div class="test-stats">
          <div class="test-stat">
            <div class="test-stat-num">${totalQuestions}</div>
            <div class="test-stat-label">Questions</div>
          </div>
          <div class="test-stat">
            <div class="test-stat-num">${s.total_marks}</div>
            <div class="test-stat-label">Marks</div>
          </div>
          <div class="test-stat">
            <div class="test-stat-num">${minutes}</div>
            <div class="test-stat-label">Minutes</div>
          </div>
        </div>
        <div class="test-sections-preview">
          ${s.sections.map(sec => `
            <div class="test-section-preview">
              <strong>${this.escapeHtml(sec.title)}</strong> · ${sec.marks} marks · ${sec.questions.length} questions
            </div>
          `).join('')}
        </div>
        <button class="test-start-btn" data-start-test="1">Start Test →</button>
      </div>
      ${this.renderStarsInfoCard(4)}
    `;
  },

  renderTestActive() {
    const s = this.data.stage_4_test;
    const elapsed = Math.floor((Date.now() - this.state.testStartTime) / 1000);
    const remaining = Math.max(0, (s.duration_seconds || 2400) - elapsed);
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    let timerClass = '';
    if (remaining < 60) timerClass = 'urgent';
    else if (remaining < 300) timerClass = 'warning';

    if (remaining === 0 && !this.state.testTimeUp) {
      this.state.testTimeUp = true;
      setTimeout(() => this.submitTest(), 100);
    }

    const totalQuestions = s.sections.reduce((sum, sec) => sum + sec.questions.length, 0);
    const answeredCount = Object.keys(this.state.testAnswers).filter(k => {
      const v = this.state.testAnswers[k];
      return v && v.value !== undefined && String(v.value).trim() !== '';
    }).length;

    return `
      <div class="timer-bar">
        <div class="timer-display ${timerClass}" id="timer-display">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div>
        <div class="timer-progress" id="timer-progress">${answeredCount} / ${totalQuestions} answered</div>
      </div>
      ${s.sections.map((sec, sidx) => this.renderTestSection(sec, sidx + 1)).join('')}
      <div class="test-submit-zone">
        <p style="margin-bottom: 12px; color: var(--ink-soft); font-size: 14px;">When you're done, submit your test.</p>
        <button class="btn btn-primary test-submit-btn" data-submit-test="1">Submit Test ✓</button>
      </div>
    `;
  },

  renderTestSection(section, sidx) {
    return `
      <div class="test-section">
        <div class="test-section-header">
          <h3>${this.escapeHtml(section.title)}</h3>
          <span class="test-section-marks">${section.marks} marks</span>
        </div>
        ${section.instructions ? `<p class="test-section-instructions">${this.escapeHtml(section.instructions)}</p>` : ''}
        ${section.passage ? this.renderTestPassage(section.passage) : ''}
        ${section.questions.map((q, i) => this.renderTestQuestion(q, sidx, i + 1)).join('')}
      </div>
    `;
  },

  renderTestPassage(passage) {
    // Hide the "e-Gurukul (AI generated)" author line and the parent review note from the student-facing UI.
    // The is_ai_generated flag remains in the JSON for the parent's reference when reviewing/editing chapters.
    const showAuthor = passage.author && !/(e-gurukul|ai[\s-]?generated)/i.test(passage.author);
    return `
      <div class="test-passage">
        <div class="test-passage-title">${this.escapeHtml(passage.title)}</div>
        ${showAuthor ? `<div class="test-passage-author">${this.escapeHtml(passage.author)}</div>` : ''}
        <div class="test-passage-text">${this.escapeHtml(passage.text)}</div>
      </div>
    `;
  },

  renderTestQuestion(q, sidx, qnum) {
    const ans = this.state.testAnswers[q.id] || {};
    const value = ans.value !== undefined ? String(ans.value) : '';

    let inputHtml = '';
    if (q.type === 'mcq') {
      inputHtml = `
        <ul class="options-list">
          ${q.options.map((opt, i) => {
            const selected = ans.value === opt;
            return `<li><button class="option-btn ${selected ? 'test-selected' : ''}" data-test-mcq="${this.escapeAttr(q.id)}" data-value="${this.escapeAttr(opt)}">
              <span class="option-letter">${String.fromCharCode(65 + i)}</span><span>${this.escapeHtml(opt)}</span>
            </button></li>`;
          }).join('')}
        </ul>
      `;
    } else if (q.type === 'fill_blank') {
      inputHtml = `<input type="text" class="text-input" data-test-input="${this.escapeAttr(q.id)}" value="${this.escapeAttr(value)}" placeholder="Type your answer...">`;
    } else if (q.type === 'short_answer' || q.type === 'subjective' || q.type === 'subjective_self_eval') {
      const wlimit = q.word_limit || '';
      const wc = this.countWords(value);
      const wccls = this.wordCounterClass(wc, wlimit);
      inputHtml = `
        ${wlimit ? `<div class="word-limit-tag">📝 Word limit: ${this.escapeHtml(wlimit)}</div>` : ''}
        <textarea class="text-input" rows="${q.type === 'mcq' ? 4 : 6}" data-test-input="${this.escapeAttr(q.id)}" placeholder="Write your answer here...">${this.escapeHtml(value)}</textarea>
        <div class="word-counter ${wccls}" data-counter-for="${this.escapeAttr(q.id)}">
          ${wc} word${wc === 1 ? '' : 's'}${wlimit ? ` · target: ${this.escapeHtml(wlimit)}` : ''}
        </div>
      `;
    }

    return `
      <div class="test-question">
        <div class="test-q-header">
          <span class="test-q-num">Q${qnum}</span>
          <span class="test-q-type">${q.type.replace('_', ' ').toUpperCase()}</span>
          <span class="marks-tag">${q.marks} mark${q.marks > 1 ? 's' : ''}</span>
        </div>
        <p class="question-text">${this.escapeHtml(q.question)}</p>
        ${inputHtml}
      </div>
    `;
  },

  startTest() {
    this.state.testStartTime = Date.now();
    this.state.testAnswers = {};
    this.state.testTimeUp = false;
    this.state.testSubmitted = false;
    this.startTimer();
    this.render();
    this.scrollToTop();
  },

  captureTestInputs() {
    document.querySelectorAll('[data-test-input]').forEach(el => {
      const qid = el.dataset.testInput;
      this.state.testAnswers[qid] = { ...(this.state.testAnswers[qid] || {}), value: el.value };
    });
  },

  submitTest() {
    this.captureTestInputs();
    this.stopTimer();
    this.state.testSubmitted = true;
    this.saveProgress();
    this.render();
    // Scroll to the badge/score hero, not the top of the page
    requestAnimationFrame(() => {
      const hero = document.querySelector('.results-hero');
      if (hero) {
        hero.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        this.scrollToTop();
      }
    });
  },

  retakeTest() {
    if (!confirm('Retake the test? Your previous test answers will be cleared. (Other progress in Stages 1-3 stays.)')) return;
    this.state.testStartTime = null;
    this.state.testAnswers = {};
    this.state.testTimeUp = false;
    this.state.testSubmitted = false;
    this.saveProgress();
    this.render();
    this.scrollToTop();
  },

  // ============================================================
  // TIMER
  // ============================================================
  timerInterval: null,
  startTimer() {
    this.stopTimer();
    this.timerInterval = setInterval(() => {
      if (this.state.testSubmitted || this.state.testStartTime === null) {
        this.stopTimer();
        return;
      }
      const s = this.data.stage_4_test;
      const elapsed = Math.floor((Date.now() - this.state.testStartTime) / 1000);
      const remaining = Math.max(0, (s.duration_seconds || 2400) - elapsed);
      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;
      const display = document.getElementById('timer-display');
      if (display) {
        display.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        display.className = 'timer-display ' + (remaining < 60 ? 'urgent' : (remaining < 300 ? 'warning' : ''));
      }
      const progress = document.getElementById('timer-progress');
      if (progress) {
        const totalQuestions = s.sections.reduce((sum, sec) => sum + sec.questions.length, 0);
        // Capture current input values to keep "answered count" live without re-rendering
        document.querySelectorAll('[data-test-input]').forEach(el => {
          const qid = el.dataset.testInput;
          this.state.testAnswers[qid] = { ...(this.state.testAnswers[qid] || {}), value: el.value };
        });
        const answered = Object.keys(this.state.testAnswers).filter(k => {
          const v = this.state.testAnswers[k];
          return v && v.value !== undefined && String(v.value).trim() !== '';
        }).length;
        progress.textContent = `${answered} / ${totalQuestions} answered`;
      }
      if (remaining === 0 && !this.state.testTimeUp) {
        this.state.testTimeUp = true;
        this.stopTimer();
        this.submitTest();
      }
    }, 1000);
  },

  stopTimer() {
    if (this.timerInterval) {
      clearInterval(this.timerInterval);
      this.timerInterval = null;
    }
  },

  // ============================================================
  // RESULTS / SCORING
  // ============================================================
  computeStageScores() {
    // === STAGE 1: 1 ⭐ per correct answer (panels + spot-its). Total varies by chapter. ===
    const s1 = this.data.stage_1_learn;
    let s1Score = 0, s1Max = 0;
    s1.branches.forEach(b => {
      if (b.type === 'story_panels') {
        b.panels.forEach(p => {
          if (p.comprehension_check) {
            s1Max += 1;
            const a = this.state.panelChecks[p.id];
            if (a && a.selected === p.comprehension_check.correct) s1Score += 1;
          }
        });
      } else if (b.type === 'vocabulary_cards') {
        b.cards.forEach(c => {
          if (c.spot_it) {
            s1Max += 1;
            const a = this.state.spotItAnswers[c.id];
            if (a && a.correct) s1Score += 1;
          }
        });
      }
    });

    // === STAGE 2: 1 ⭐ per correct MCQ. ===
    const s2 = this.data.stage_2_practice;
    let s2Score = 0, s2Max = 0;
    s2.sections.forEach(sec => {
      sec.questions.forEach(q => {
        s2Max += 1;
        const a = this.state.practiceAnswers[q.id];
        if (a && a.selected === q.correct) s2Score += 1;
      });
    });

    // === STAGE 3: per problem = (1 if word-limit met) + (1 per ticked criterion, max 4) = 0..5 ===
    // Parent override (0..5) wins over self-check.
    const s3 = this.data.stage_3_think;
    let s3Score = 0, s3Max = 0;
    s3.problems.forEach(p => {
      s3Max += 5;  // every problem is worth exactly 5 stars
      const sub = this.state.thinkSubmissions[p.id];
      if (!sub || !sub.submitted) return;
      s3Score += this.scoreThinkProblemStars(p);
    });

    // === STAGE 4: marks (unchanged). ===
    const s4 = this.data.stage_4_test;
    const breakdown = this.gradeTestQuestions();
    const autoScore = breakdown.reduce((sum, b) => sum + b.marks_awarded, 0);
    const manualPotential = breakdown.filter(b => b.needs_manual).reduce((sum, b) => sum + b.q.marks, 0);
    const optimisticTotal = autoScore + manualPotential;
    const s4Max = s4.total_marks || 25;
    const s4Score = Math.round((optimisticTotal / s4Max) * 25);

    return {
      stage1: { score: s1Score, max: s1Max, unit: 'stars' },
      stage2: { score: s2Score, max: s2Max, unit: 'stars' },
      stage3: { score: s3Score, max: s3Max, unit: 'stars' },
      stage4: { score: s4Score, max: 25, unit: 'marks', manualMarks: manualPotential, breakdown, rawAutoScore: autoScore, rawTotal: s4Max },
      // grandTotal kept for legacy callers but no longer headlined
      grandTotal: s1Score + s2Score + s3Score + s4Score,
      grandMax: s1Max + s2Max + s3Max + 25,
    };
  },

  // Stage 3 stars: independent components, 0..5 per problem.
  // Parent override (if set) overrides everything, clamped to 0..5.
  scoreThinkProblemStars(p) {
    const override = this.state.parentOverrides[p.id];
    if (override !== undefined && override !== null && override !== '') {
      const n = parseFloat(override);
      if (!isNaN(n)) return Math.max(0, Math.min(5, Math.round(n)));
    }
    const sub = this.state.thinkSubmissions[p.id];
    if (!sub || !sub.submitted) return 0;
    const answer = (sub.value || '').trim();
    if (!answer) return 0;

    let stars = 0;
    // 1 ⭐ for word-limit met (or if no word limit specified)
    const range = this.wordLimitRange(p.word_limit);
    if (range) {
      const wc = this.countWords(answer);
      if (wc >= range.min) stars += 1;
    } else {
      stars += 1; // no limit specified, give the writing star
    }
    // up to 4 ⭐ from self-check ticks
    const ticks = this.state.selfCheckTicks[p.id] || [];
    const tickedCount = ticks.filter(t => t === true).length;
    stars += Math.min(4, tickedCount);
    return Math.min(5, stars);
  },

  // Renders a small "How stars are calculated" info accordion at the bottom of each stage.
  // Stage 4 explains marks instead of stars.
  renderStarsInfoCard(stageNum) {
    const explanations = {
      1: {
        title: '⭐ How stars are earned in Learn',
        body: `<strong>1 ⭐ for every correct answer.</strong> Total stars depend on how many panels and vocabulary cards are in the chapter.<br><br>
               <em>Example:</em> If The Story has 5 panels with 5 questions, you can earn up to 5 ⭐ there. Plus 1 ⭐ for each correct "Spot it!" in Word Power.`
      },
      2: {
        title: '⭐ How stars are earned in Practice',
        body: `<strong>1 ⭐ for every correct answer.</strong> Each section has different numbers of questions.<br><br>
               <em>Example:</em> Section A with 4 questions → up to 4 ⭐. Get 3 right = ⭐ 3 / 4 stars.`
      },
      3: {
        title: '⭐ How stars are earned in Think Deeper',
        body: `Each question is worth up to <strong>5 ⭐</strong>:<br>
               • <strong>1 ⭐</strong> if you meet the word limit<br>
               • <strong>4 ⭐</strong> from the self-check (1 ⭐ per ticked criterion)<br><br>
               <em>Example:</em> You write 50 words (in range) and tick 3 of 4 criteria = 1 + 3 = ⭐ 4 / 5 stars.<br><br>
               A parent can override the score on any question — that override always wins.`
      },
      4: {
        title: '📋 How marks work in the Test',
        body: `The Test mirrors your school's exam format and is graded out of <strong>25 marks</strong>:<br>
               • <strong>MCQs and fill-in-the-blanks</strong> are auto-graded.<br>
               • <strong>Short and long answers</strong> use the same self-check as Stage 3 (with parent override).<br><br>
               This is the only stage where school-style marks apply. Stages 1–3 are for learning, this is the assessment.`
      }
    };
    const e = explanations[stageNum];
    if (!e) return '';
    return `
      <details class="stars-info-card">
        <summary>${e.title}</summary>
        <div class="stars-info-body">${e.body}</div>
      </details>
    `;
  },

  gradeTestQuestions() {
    const s = this.data.stage_4_test;
    const out = [];
    s.sections.forEach(sec => {
      sec.questions.forEach(q => {
        const ans = this.state.testAnswers[q.id] || {};
        const userAnswer = (ans.value !== undefined ? String(ans.value) : '').trim();

        if (q.type === 'mcq') {
          const correct = userAnswer.toLowerCase() === String(q.correct_answer || '').toLowerCase();
          out.push({
            q, section: sec, user_answer: userAnswer,
            correct_display: q.correct_answer || '',
            is_correct: correct,
            marks_awarded: correct ? q.marks : 0,
            needs_manual: false,
            grading_type: 'auto',
          });
        } else if (q.type === 'fill_blank') {
          const norm = (s) => s.toLowerCase().trim().replace(/[.,;:!?'"]/g, '').replace(/\s+/g, ' ');
          const correct = norm(userAnswer) === norm(String(q.correct_answer || ''));
          out.push({
            q, section: sec, user_answer: userAnswer,
            correct_display: q.correct_answer || '',
            is_correct: correct,
            marks_awarded: correct ? q.marks : 0,
            needs_manual: false,
            grading_type: 'auto',
          });
        } else if (q.type === 'subjective_self_eval' && q.self_check_criteria && q.self_check_criteria.length > 0) {
          // Self-check based grading (with parent override support)
          const score = this.scoreSubjectiveSelfEval(q, q.marks);
          out.push({
            q, section: sec, user_answer: userAnswer,
            correct_display: '(self-checked)',
            is_correct: null,
            marks_awarded: score.marks,
            needs_manual: false,
            grading_type: score.source,  // 'self_check' | 'parent' | 'engagement' | 'no_answer'
          });
        } else {
          // Legacy: short_answer or subjective without criteria — manual (optimistic full marks for display)
          out.push({
            q, section: sec, user_answer: userAnswer,
            correct_display: '(See model answer)',
            is_correct: null,
            marks_awarded: 0,
            needs_manual: true,
            grading_type: 'manual',
          });
        }
      });
    });
    return out;
  },

  getBadge(percentage) {
    const badges = this.data.badges || {};
    if (badges.champion && percentage >= badges.champion.threshold) return badges.champion;
    if (badges.star && percentage >= badges.star.threshold) return badges.star;
    if (badges.spark && percentage >= badges.spark.threshold) return badges.spark;
    return null;
  },

  // Secondary tier message based on absolute test score (0-25 scale).
  // Always shown alongside the badge, never replacing it.
  getSecondaryMessage(testScore) {
    if (testScore >= 24) return 'You are a champion';
    if (testScore >= 20) return 'Good job';
    if (testScore >= 15) return 'Nice effort, aim higher';
    if (testScore >= 10) return 'Room for improvement, try again';
    return 'You can do better, try again';
  },

  renderResults() {
    const scores = this.computeStageScores();
    const testScore = scores.stage4.score;
    const testMax = scores.stage4.max;
    const testPercentage = testMax > 0 ? Math.round((testScore / testMax) * 100) : 0;
    const badge = this.getBadge(testPercentage);
    const quotes = this.data.motivational_quotes || ["Every champion was once a beginner who refused to give up."];
    const quote = quotes[Math.floor(Math.random() * quotes.length)];
    const confetti = badge ? this.generateConfetti() : '';

    // Secondary message based on test score (out of 25)
    const secondaryMessage = this.getSecondaryMessage(testScore);

    // Stars earned across Stages 1-3
    const starsEarned = scores.stage1.score + scores.stage2.score + scores.stage3.score;
    const starsPossible = scores.stage1.max + scores.stage2.max + scores.stage3.max;

    return `
      <div class="results-screen">
        <div class="results-hero">
          ${confetti}
          <p class="secondary-message" id="secondary-message">${this.escapeHtml(secondaryMessage)}</p>
          ${badge ? `
            <div class="badge-circle">
              <span class="badge-emoji">${badge.emoji}</span>
            </div>
            <h2 class="badge-name">${this.escapeHtml(badge.name)}</h2>
            <p class="badge-tagline">${this.escapeHtml(badge.tagline || '')}</p>
          ` : `
            <div class="badge-circle no-badge">
              <span class="badge-emoji">🌱</span>
            </div>
            <h2 class="badge-name">Good effort!</h2>
            <p class="badge-tagline">Every try makes you stronger. Keep going!</p>
          `}
          <div class="results-percentage" id="results-headline">
            <div class="percentage-num"><span id="headline-test-score">${testScore}</span> / <span id="headline-test-max">${testMax}</span></div>
            <div class="percentage-label">Test Score · <span id="headline-test-percent">${testPercentage}</span>%</div>
          </div>
        </div>

        <div class="motivational-quote">${this.escapeHtml(quote)}</div>

        <div class="section-scores">
          <h3>Your Learning Journey</h3>
          <div class="scores-table">
            ${this.renderJourneyCell('📖', 'Learn', scores.stage1, 'stars')}
            ${this.renderJourneyCell('✏️', 'Practice', scores.stage2, 'stars')}
            ${this.renderJourneyCell('💭', 'Think', scores.stage3, 'stars')}
            ${this.renderJourneyCell('🏆', 'Test', scores.stage4, 'marks')}
          </div>
          <div class="stars-summary">⭐ <strong>${starsEarned}</strong> of <strong>${starsPossible}</strong> stars earned across Stages 1–3</div>
        </div>

        <div class="reattempt-card">
          <h4>Think you can do better? 🎯</h4>
          <p>Take the test again — try to beat your score!</p>
          <button class="reattempt-btn" data-retake-test="1">↻ Retake Test</button>
        </div>

        ${scores.stage4.manualMarks > 0 ? `
          <div class="manual-grading-note">
            <strong>📝 Note for parent:</strong> ${scores.stage4.manualMarks} mark${scores.stage4.manualMarks > 1 ? 's' : ''} in the Test need${scores.stage4.manualMarks > 1 ? '' : 's'} to be checked manually. The score above assumes full marks for those — please review the answers below and adjust.
          </div>
        ` : ''}

        <div class="results-detail">
          <h4>Test — Your Answers Reviewed</h4>
          ${scores.stage4.breakdown.map((b, i) => `
            <div class="review-item">
              <div class="review-q">
                <strong>Q${i+1}.</strong> <em>${this.escapeHtml(b.section.title)}</em><br>
                ${this.escapeHtml(b.q.question)}
              </div>
              <div class="review-content">
                ${b.grading_type === 'auto' ? `
                  <div class="review-row"><strong>Your answer:</strong> ${this.escapeHtml(b.user_answer || '(not answered)')}</div>
                  <div class="review-row"><strong>Correct:</strong> ${this.escapeHtml(b.correct_display)}</div>
                  <div class="review-result ${b.is_correct ? 'correct' : 'incorrect'}">${b.is_correct ? `✓ +${b.marks_awarded}` : `0 / ${b.q.marks}`}</div>
                ` : (b.grading_type === 'self_check' || b.grading_type === 'parent' || b.grading_type === 'engagement' || b.grading_type === 'no_answer') ? `
                  <div class="review-row"><strong>Your answer:</strong> ${this.escapeHtml(b.user_answer || '(not answered)')}</div>
                  ${b.q.self_check_criteria && b.q.self_check_criteria.length > 0
                    ? this.renderSelfCheckPanel(b.q, b.q.marks, { interactive: true })
                    : ''}
                  ${b.q.model_answer ? `
                    <details class="model-answer-accordion" style="margin-top:10px;">
                      <summary>▶ See model answer</summary>
                      <div class="model-answer-box">
                        <p class="answer-text">${this.escapeHtml(b.q.model_answer)}</p>
                        ${b.q.marking_guide_for_parent ? `
                          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--paper-dark);">
                            <span class="feedback-label" style="color: var(--berry);">For parent</span>
                            <p class="answer-text" style="font-size:13px;font-style:italic;">${this.escapeHtml(b.q.marking_guide_for_parent)}</p>
                          </div>
                        ` : ''}
                      </div>
                    </details>
                  ` : ''}
                ` : `
                  <div class="review-row"><strong>Your answer:</strong> "${this.escapeHtml(b.user_answer || '(not answered)')}"</div>
                  ${b.q.model_answer ? `<div class="review-row"><strong>Model:</strong> ${this.escapeHtml(b.q.model_answer)}</div>` : ''}
                  ${b.q.marking_guide ? `<div class="review-row" style="font-style:italic;color:var(--ink-soft);font-size:13px;"><strong>For parent:</strong> ${this.escapeHtml(b.q.marking_guide)}</div>` : ''}
                  <div class="review-result manual">${b.q.marks} marks · manual grading</div>
                `}
              </div>
            </div>
          `).join('')}
        </div>

        <div class="results-actions">
          <button class="btn btn-secondary" data-back-home="1">← Back to Stages</button>
        </div>
      </div>
    `;
  },

  renderJourneyCell(icon, label, scoreObj, unit) {
    const pct = scoreObj.max > 0 ? (scoreObj.score / scoreObj.max) * 100 : 0;
    let cls = '';
    let tag = '';
    if (pct >= 80) { cls = 'strong'; tag = '<span class="score-cell-tag strong-tag">Strong</span>'; }
    else if (pct < 50) { cls = 'improvement'; tag = '<span class="score-cell-tag improve-tag">Practice More</span>'; }
    else { tag = '<span class="score-cell-tag neutral-tag">Good</span>'; }

    const unitIcon = unit === 'stars' ? '⭐ ' : '';
    const unitLabel = unit === 'stars' ? 'stars' : 'marks';

    return `
      <div class="score-cell ${cls}">
        <div class="score-cell-icon">${icon}</div>
        <div class="score-cell-label">${label}</div>
        <div class="score-cell-num">${unitIcon}${scoreObj.score}</div>
        <div class="score-cell-out-of">of ${scoreObj.max} ${unitLabel}</div>
        ${tag}
      </div>
    `;
  },

  // Backward compat: alias retained but unused by new results page
  renderScoreCell(icon, label, scoreObj) {
    return this.renderJourneyCell(icon, label, scoreObj, 'marks');
  },

  // Update headline numbers on the results page after parent override changes
  // (without doing a full re-render that would interrupt typing focus)
  updateResultsHeadline() {
    const scores = this.computeStageScores();
    const testScore = scores.stage4.score;
    const testMax = scores.stage4.max;
    const testPercentage = testMax > 0 ? Math.round((testScore / testMax) * 100) : 0;

    const headlineScore = document.getElementById('headline-test-score');
    const headlinePercent = document.getElementById('headline-test-percent');
    if (headlineScore) headlineScore.textContent = testScore;
    if (headlinePercent) headlinePercent.textContent = testPercentage;

    // Update the Test cell in the journey table — find by label
    const cells = document.querySelectorAll('.scores-table .score-cell');
    cells.forEach(cell => {
      const label = cell.querySelector('.score-cell-label')?.textContent;
      if (label === 'Test') {
        const num = cell.querySelector('.score-cell-num');
        const tag = cell.querySelector('.score-cell-tag');
        if (num) num.textContent = scores.stage4.score;
        // Update color band based on new percentage
        cell.classList.remove('strong', 'improvement');
        if (testPercentage >= 80) cell.classList.add('strong');
        else if (testPercentage < 50) cell.classList.add('improvement');
        if (tag) {
          tag.classList.remove('strong-tag', 'improve-tag', 'neutral-tag');
          if (testPercentage >= 80) { tag.textContent = 'Strong'; tag.classList.add('strong-tag'); }
          else if (testPercentage < 50) { tag.textContent = 'Practice More'; tag.classList.add('improve-tag'); }
          else { tag.textContent = 'Good'; tag.classList.add('neutral-tag'); }
        }
      }
    });

    // Update badge if threshold crossed
    const badge = this.getBadge(testPercentage);
    const badgeName = document.querySelector('.badge-name');
    const badgeTagline = document.querySelector('.badge-tagline');
    const badgeEmoji = document.querySelector('.badge-emoji');
    const badgeCircle = document.querySelector('.badge-circle');
    if (badgeName && badgeTagline && badgeEmoji && badgeCircle) {
      if (badge) {
        badgeName.textContent = badge.name;
        badgeTagline.textContent = badge.tagline || '';
        badgeEmoji.textContent = badge.emoji;
        badgeCircle.classList.remove('no-badge');
      } else {
        badgeName.textContent = 'Good effort!';
        badgeTagline.textContent = 'Every try makes you stronger. Keep going!';
        badgeEmoji.textContent = '🌱';
        badgeCircle.classList.add('no-badge');
      }
    }

    // Update secondary tier message
    const secondaryEl = document.getElementById('secondary-message');
    if (secondaryEl) secondaryEl.textContent = this.getSecondaryMessage(testScore);

    // Update stars summary line
    const starsSummary = document.querySelector('.stars-summary');
    if (starsSummary) {
      const starsEarned = scores.stage1.score + scores.stage2.score + scores.stage3.score;
      const starsPossible = scores.stage1.max + scores.stage2.max + scores.stage3.max;
      starsSummary.innerHTML = `⭐ <strong>${starsEarned}</strong> of <strong>${starsPossible}</strong> stars earned across Stages 1–3`;
    }
  },

  generateConfetti() {
    const colors = ['#E87722', '#F4A82C', '#D4A53A', '#4A7C59', '#5B8DB8', '#B8385E', '#FFFFFF'];
    let html = '';
    for (let i = 0; i < 30; i++) {
      const left = Math.random() * 100;
      const delay = Math.random() * 3;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const rotate = Math.random() * 360;
      html += `<div class="confetti-piece" style="left:${left}%;background:${color};animation-delay:${delay}s;transform:rotate(${rotate}deg);"></div>`;
    }
    return html;
  },

  renderStageNav() {
    const canPrev = this.currentStage > 1;
    const canNext = this.currentStage < 4 && this.isStageUnlocked(this.currentStage + 1);
    const stageLabels = ['', 'Learn', 'Practice', 'Think', 'Test'];
    return `
      <div class="stage-nav">
        ${canPrev ? `<button class="btn btn-secondary" data-stage-nav="prev">← Back to ${stageLabels[this.currentStage - 1]}</button>` : '<div></div>'}
        ${canNext ? `<button class="btn btn-primary" data-stage-nav="next">Next: ${stageLabels[this.currentStage + 1]} →</button>` : (this.currentStage < 4 ? `<button class="btn btn-primary" disabled title="Complete current stage first">Next: ${stageLabels[this.currentStage + 1]} →</button>` : '<div></div>')}
      </div>
    `;
  },

  bindEvents() {
    // Use document.body so the listener survives across renders.
    // Called ONCE in init().
    document.body.addEventListener('click', (e) => {
      const t = e.target;

      if (t.dataset && t.dataset.closeModal) { this.state.spotItModal = null; this.render(); return; }
      if (t.classList && t.classList.contains('highlight-word')) { this.showWordTooltip(t); return; }

      const target = t.closest('[data-stage], [data-enter-branch], [data-back-to-branches], [data-panel-nav], [data-panel-check], [data-flip-card], [data-open-spot-it], [data-spot-answer], [data-enter-section], [data-back-to-sections], [data-practice-answer], [data-show-hint], [data-stage-nav], [data-vocab-group], [data-reset-progress], [data-jump-to-panel], [data-think-submit], [data-think-edit], [data-start-test], [data-submit-test], [data-retake-test], [data-back-home], [data-test-mcq], [data-self-check], [data-dd-topic], [data-dd-back], [data-dd-banner]');
      if (!target) return;

      if (target.dataset.resetProgress) {
        this.resetProgress();
        return;
      }
      if (target.dataset.jumpToPanel !== undefined) {
        const idx = parseInt(target.dataset.jumpToPanel, 10);
        if (!isNaN(idx)) {
          this.currentPanelIdx = idx;
          this.render();
          this.scrollToTop();
        }
        return;
      }
      if (target.dataset.ddBanner) {
        this.currentStage = 0;
        this.currentDDTopic = null;
        this.currentBranch = null; this.currentSection = null;
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.ddTopic) {
        this.currentDDTopic = target.dataset.ddTopic;
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.ddBack) {
        this.currentDDTopic = null;
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.stage !== undefined) {
        const num = parseInt(target.dataset.stage, 10);
        if (this.isStageUnlocked(num) || num === this.currentStage) {
          this.currentStage = num;
          this.currentBranch = null;
          this.currentSection = null;
          this.currentDDTopic = null;
          this.saveProgress();
          this.render();
          this.scrollToTop();
        }
        return;
      }
      if (target.dataset.enterBranch) {
        this.currentBranch = target.dataset.enterBranch;
        this.currentPanelIdx = 0;
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.backToBranches) {
        this.currentBranch = null;
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.panelNav) {
        const branch = this.data.stage_1_learn.branches.find(b => b.id === this.currentBranch);
        if (target.dataset.panelNav === 'prev' && this.currentPanelIdx > 0) this.currentPanelIdx--;
        else if (target.dataset.panelNav === 'next' && this.currentPanelIdx < branch.panels.length - 1) this.currentPanelIdx++;
        else if (target.dataset.panelNav === 'finish-branch') { this.currentBranch = null; this.saveProgress(); }
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.panelCheck) {
        const panelId = target.dataset.panelCheck;
        const opt = parseInt(target.dataset.opt, 10);
        if (this.state.panelChecks[panelId] && this.state.panelChecks[panelId].selected !== undefined) return;
        this.state.panelChecks[panelId] = { ...(this.state.panelChecks[panelId] || {}), selected: opt };
        this.saveProgress();
        this.render();
        return;
      }
      if (target.dataset.flipCard) {
        if (e.target.closest('[data-open-spot-it]')) return;
        const id = target.dataset.flipCard;
        this.state.cardFlips[id] = !this.state.cardFlips[id];
        // Toggle the class directly on the live element so CSS transition animates.
        // No full re-render — that would destroy the element and skip the animation.
        target.classList.toggle('flipped');
        this.saveProgress();
        return;
      }
      if (target.dataset.vocabGroup) {
        this.currentVocabGroup = target.dataset.vocabGroup;
        this.render();
        return;
      }
      if (target.dataset.openSpotIt) {
        e.stopPropagation();
        this.state.spotItModal = target.dataset.openSpotIt;
        this.render();
        return;
      }
      if (target.dataset.spotAnswer) {
        const id = target.dataset.spotAnswer;
        const opt = parseInt(target.dataset.opt, 10);
        if (this.state.spotItAnswers[id] !== undefined) return;
        let card = null;
        for (const branch of this.data.stage_1_learn.branches) {
          if (branch.cards) { card = branch.cards.find(c => c.id === id); if (card) break; }
        }
        if (!card) return;
        this.state.spotItAnswers[id] = { selected: opt, correct: opt === card.spot_it.correct };
        this.saveProgress();
        this.render();
        return;
      }
      if (target.dataset.enterSection) {
        this.currentSection = target.dataset.enterSection;
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.backToSections) {
        this.currentSection = null;
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.practiceAnswer) {
        const qid = target.dataset.practiceAnswer;
        const opt = parseInt(target.dataset.opt, 10);
        if (this.state.practiceAnswers[qid] && this.state.practiceAnswers[qid].selected !== undefined) return;
        this.state.practiceAnswers[qid] = { ...(this.state.practiceAnswers[qid] || {}), selected: opt };
        this.saveProgress();
        this.render();
        return;
      }
      if (target.dataset.showHint) {
        const qid = target.dataset.showHint;
        this.state.practiceAnswers[qid] = { ...(this.state.practiceAnswers[qid] || {}), showHint: true };
        this.saveProgress();
        this.render();
        return;
      }
      // Self-check checkbox toggle (Stage 3 + Stage 4 review)
      if (target.dataset.selfCheck !== undefined) {
        const qid = target.dataset.selfCheck;
        const idx = parseInt(target.dataset.idx, 10);
        if (isNaN(idx)) return;
        // Find the question (Stage 3 or Stage 4)
        let q = (this.data.stage_3_think.problems || []).find(p => p.id === qid);
        if (!q) {
          for (const sec of (this.data.stage_4_test.sections || [])) {
            q = (sec.questions || []).find(qq => qq.id === qid);
            if (q) break;
          }
        }
        if (!q || !q.self_check_criteria) return;
        const total = q.self_check_criteria.length;
        const ticks = (this.state.selfCheckTicks[qid] || []).slice();
        // Pad to length
        while (ticks.length < total) ticks.push(false);
        ticks[idx] = !ticks[idx];
        this.state.selfCheckTicks[qid] = ticks;
        this.saveProgress();
        this.render();
        return;
      }
      // Stage 3 — submit a Think problem
      if (target.dataset.thinkSubmit) {
        const pid = target.dataset.thinkSubmit;
        const ta = document.querySelector(`[data-think-input="${CSS.escape(pid)}"]`);
        const value = ta ? ta.value.trim() : '';
        if (!value) {
          alert('Please write your answer first before submitting.');
          return;
        }
        this.state.thinkSubmissions[pid] = { value, submitted: true };
        this.saveProgress();
        this.render();
        return;
      }
      // Stage 3 — edit (un-submit)
      if (target.dataset.thinkEdit) {
        const pid = target.dataset.thinkEdit;
        const existing = this.state.thinkSubmissions[pid] || {};
        this.state.thinkSubmissions[pid] = { ...existing, submitted: false };
        this.saveProgress();
        this.render();
        return;
      }
      // Stage 4 — start the test
      if (target.dataset.startTest) {
        this.startTest();
        return;
      }
      // Stage 4 — MCQ click
      if (target.dataset.testMcq) {
        // Capture text inputs first so we don't lose typed values on re-render
        this.captureTestInputs();
        const qid = target.dataset.testMcq;
        const value = target.dataset.value;
        this.state.testAnswers[qid] = { value };
        this.render();
        return;
      }
      // Stage 4 — submit
      if (target.dataset.submitTest) {
        if (!confirm('Submit your test? You will not be able to change your answers after this.')) return;
        this.submitTest();
        return;
      }
      // Results — retake test
      if (target.dataset.retakeTest) {
        this.retakeTest();
        return;
      }
      // Results — back home
      if (target.dataset.backHome) {
        this.currentStage = 1;
        this.saveProgress();
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.stageNav === 'prev') {
        this.currentStage = Math.max(1, this.currentStage - 1);
        this.currentBranch = null; this.currentSection = null;
        this.stopTimer();
        this.saveProgress();
        this.render();
        this.scrollToTop();
        return;
      }
      if (target.dataset.stageNav === 'next') {
        if (this.isStageUnlocked(this.currentStage + 1)) {
          this.currentStage = Math.min(4, this.currentStage + 1);
          this.currentBranch = null; this.currentSection = null;
          this.stopTimer();
          this.saveProgress();
          this.render();
          this.scrollToTop();
        }
        return;
      }
    });

    // Input listener for Think textareas + Test text inputs — live word count, save state
    document.body.addEventListener('input', (e) => {
      const t = e.target;
      // Stage 3 — Think problems
      if (t.dataset && t.dataset.thinkInput) {
        const pid = t.dataset.thinkInput;
        const value = t.value;
        const existing = this.state.thinkSubmissions[pid] || {};
        this.state.thinkSubmissions[pid] = { ...existing, value, submitted: false };
        // Update word counter directly without re-render (preserves cursor)
        const counter = document.querySelector(`[data-counter-for="${CSS.escape(pid)}"]`);
        if (counter) {
          const wc = this.countWords(value);
          // Find the original problem to read word_limit
          const problem = this.data.stage_3_think.problems.find(p => p.id === pid);
          const limit = problem ? problem.word_limit : '';
          counter.textContent = `${wc} word${wc === 1 ? '' : 's'}${limit ? ` · target: ${limit}` : ''}`;
          counter.className = 'word-counter ' + this.wordCounterClass(wc, limit);
        }
        return;
      }
      // Stage 4 — Test text inputs
      if (t.dataset && t.dataset.testInput) {
        const qid = t.dataset.testInput;
        const value = t.value;
        this.state.testAnswers[qid] = { ...(this.state.testAnswers[qid] || {}), value };
        // Update word counter for short_answer / subjective
        const counter = document.querySelector(`[data-counter-for="${CSS.escape(qid)}"]`);
        if (counter) {
          const wc = this.countWords(value);
          let limit = '';
          // Find the question for word_limit
          for (const sec of this.data.stage_4_test.sections) {
            const q = sec.questions.find(q => q.id === qid);
            if (q) { limit = q.word_limit || ''; break; }
          }
          counter.textContent = `${wc} word${wc === 1 ? '' : 's'}${limit ? ` · target: ${limit}` : ''}`;
          counter.className = 'word-counter ' + this.wordCounterClass(wc, limit);
        }
        return;
      }
      // Parent override — typing a score
      if (t.dataset && t.dataset.parentOverride) {
        const qid = t.dataset.parentOverride;
        const max = parseInt(t.dataset.max, 10) || 5;
        const raw = t.value;
        if (raw === '') {
          // Clear override
          delete this.state.parentOverrides[qid];
        } else {
          const n = parseFloat(raw);
          if (!isNaN(n)) {
            this.state.parentOverrides[qid] = Math.max(0, Math.min(max, n));
          }
        }
        this.saveProgress();
        // Find the question (used for both panel update + results refresh)
        let q = (this.data.stage_3_think.problems || []).find(p => p.id === qid);
        let questionStage = 3;
        if (!q) {
          for (const sec of (this.data.stage_4_test.sections || [])) {
            q = (sec.questions || []).find(qq => qq.id === qid);
            if (q) { questionStage = 4; break; }
          }
        }
        // Update only the score display in the same panel (avoid full re-render to keep input focus)
        const panelScore = t.closest('.self-check-panel')?.querySelector('.self-check-score');
        if (panelScore && q) {
          const unit = questionStage === 3 ? 'stars' : 'marks';
          let score;
          if (unit === 'stars') {
            const stars = this.scoreThinkProblemStars(q);
            const isOverride = this.state.parentOverrides[qid] !== undefined;
            score = { marks: stars, source: isOverride ? 'parent' : 'self_check' };
          } else {
            score = this.scoreSubjectiveSelfEval(q, q.marks || max);
          }
          const unitIcon = unit === 'stars' ? '⭐ ' : '';
          const displayMax = unit === 'stars' ? 5 : (q.marks || max);
          panelScore.textContent = `${unitIcon}${score.marks} / ${displayMax} ${unit}${score.source === 'parent' ? ' · parent override' : (score.source === 'self_check' ? ' · self-graded' : '')}`;
          panelScore.className = 'self-check-score' + (score.source === 'parent' ? ' parent' : '');
        }
        // If on results screen, recompute and update headline numbers without full re-render
        if (this.state.testSubmitted && document.querySelector('.results-screen')) {
          this.updateResultsHeadline();
        }
        return;
      }
    });
  },

  showWordTooltip(el) {
    document.querySelectorAll('.word-tooltip').forEach(t => t.remove());
    const panelId = el.dataset.panelId;
    const idx = parseInt(el.dataset.wordIdx, 10);
    const branch = this.data.stage_1_learn.branches.find(b => b.id === this.currentBranch);
    if (!branch) return;
    const panel = branch.panels.find(p => p.id === panelId);
    if (!panel || !panel.highlighted_words || !panel.highlighted_words[idx]) return;
    const tip = document.createElement('span');
    tip.className = 'word-tooltip';
    tip.textContent = panel.highlighted_words[idx].meaning;
    el.appendChild(tip);
    setTimeout(() => tip.remove(), 3000);
  },

  escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  },
  escapeAttr(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>

</body>
</html>
